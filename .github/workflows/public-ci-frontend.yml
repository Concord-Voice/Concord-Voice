name: CI (Frontend)

# Public-repo CI subset (#1666). Runs in Concord-Voice/Concord-Voice on the MIRRORED tree.
# Build + unit tests + lint + type-check for the desktop client. No secrets, no private actions.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: client/desktop/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
