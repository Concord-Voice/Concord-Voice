      type: object
      required:
      - version
      - platform
      - spa_version
      - spa_hash
      properties:
        version:
          type: string
          description: Client binary version
          example: 0.1.59
        platform:
          $ref: '#/components/schemas/AttestationPlatform'
        cert_hash:
          type: string
          description: Code-signing cert hash (sha256:<hex>); required on macOS/Windows, omitted on linux/web
        machine_id:
          type: string
          description: Hardware machine ID; required on desktop platforms, omitted on web
        spa_version:
          type: string
          description: SPA bundle version currently loaded by the client
        spa_hash:
          type: string
          description: SPA index.html hash (sha256:<hex>)
    AttestationVerifyResponse:
      type: object
      properties:
        attestation_token:
          type: string
          description: Opaque attestation token bound to (session, machine)
        ttl_seconds:
          type: integer
          description: Token lifetime in seconds
          example: 7200
        expires_at:
          type: string
          format: date-time
      required:
      - attestation_token
      - ttl_seconds
      - expires_at
