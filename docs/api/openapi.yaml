  /media/upload/attachment:
    post:
      tags:
      - Media
      summary: Upload an E2EE chat attachment
      operationId: mediaUploadAttachment
      description: 'Tier 2 upload — the file body is pre-encrypted ciphertext, stored as-is. Exactly one
        of

        channel_id or conversation_id is required; channel uploads require the ATTACH_FILES permission.

        Max upload size is server-configured (UPLOAD_MAX_SIZE, default 25 MB).

        Rate limit: 30 requests per minute.

        '
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Pre-encrypted ciphertext blob
                file_type:
                  type: string
                  enum:
                  - photo
                  - animated
                  - video
                  - audio
                  - file
                  description: Client rendering hint; unrecognized values fall back to "file"
                mime_type:
                  type: string
                  description: Original plaintext MIME type hint (defaults to application/octet-stream)
                key_version:
                  type: integer
                  minimum: 1
                  default: 1
                  description: E2EE key epoch the attachment was encrypted under
                channel_id:
                  type: string
                  format: uuid
                  description: Owning channel (mutually exclusive with conversation_id)
                conversation_id:
                  type: string
                  format: uuid
                  description: Owning DM conversation (mutually exclusive with channel_id)
      responses:
        '201':
          description: Attachment stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaAttachmentUploadResponse'
        '400':
          description: Missing file, invalid key_version, or invalid/ambiguous channel_id/conversation_id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a member of the channel/conversation, or lacks the ATTACH_FILES permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: File exceeds the maximum upload size
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaFileTooLargeError'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          description: Media storage not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
