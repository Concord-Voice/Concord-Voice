  /updates/{filename}:
    get:
      tags:
      - Platform
      summary: Download a desktop update asset
      description: 'Public pre-auth endpoint serving electron-updater release assets (yml metadata +

        installer binaries) from the server''s releases directory. Filenames are sanitized

        to a base name (no path separators); symlinks and directories are rejected.

        Metadata files are served with a 5-minute cache, binaries with a 24-hour cache.

        Rate limit: 30 requests per minute (IP-based).

        '
      operationId: getUpdateAsset
      security: []
      parameters:
      - name: filename
        in: path
        required: true
        schema:
          type: string
        description: Release asset filename (e.g. latest-mac.yml, Concord-Setup-0.1.59.exe)
      responses:
        '200':
          description: Asset content. Content-Type varies by extension (text/yaml for updater metadata;
            application/zip, application/vnd.microsoft.portable-executable, etc. for binaries).
          content:
            text/yaml:
              schema:
                type: string
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Missing or invalid filename
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Asset not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          description: Update proxy not configured (no releases directory)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /users/me:
    get:
      tags:
