        code:
          type: string
          enum:
          - ATTESTATION_MISSING
          - ATTESTATION_EXPIRED
          - ATTESTATION_INVALID
          - ATTESTATION_UNKNOWN_RELEASE
          - ATTESTATION_REVOKED
          - CLIENT_VERSION_TOO_OLD
        updateAvailable:
