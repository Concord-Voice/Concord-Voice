          maxLength: 8
          pattern: ^[ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789]{8}$
        description: 8-character invite code
      responses:
        '200':
          description: Public invite preview
          content:
            application/json:
              schema:
                type: object
                required:
                - valid
                properties:
                  valid:
                    type: boolean
                  server_name:
                    type: string
                    description: Present only when the invite is valid
                  icon_url:
                    type: string
                    description: Present only when the valid invite's server has an icon
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          description: Failed to fetch invite preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
