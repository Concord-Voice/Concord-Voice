      properties:
        recovery_token:
          type: string
          description: Single-use-scoped token from /auth/recovery/verify-code
        ephemeral_public_key:
          type: string
          format: byte
          description: Base64 ephemeral public key the responder encrypts the payload/shares to
    SSOCompleteRegistrationRequest:
      type: object
