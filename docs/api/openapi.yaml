openapi: 3.0.3
info:
  title: Concord Control Plane API
  description: 'REST API for the Concord real-time communications platform.


    ## Authentication

    Most endpoints require a JWT access token passed via the `Authorization: Bearer <token>` header.

    Tokens are obtained via `/auth/login` or `/auth/register` and expire after 15 minutes.

    Use `/auth/refresh` with the HttpOnly refresh token cookie to obtain a new access token.


    ## Conventions

    - All IDs are UUIDs (v4)

    - All timestamps are ISO 8601 with timezone (TIMESTAMPTZ)

    - Error responses use `{"error": "message"}` format

    - Rate limits are documented per-endpoint; exceeded limits return 429


    ## End-to-End Encryption (E2EE)

    Channels can be encrypted using AES-256-GCM with per-channel symmetric keys (CSK).

    CSKs are wrapped per-member using RSA-OAEP 4096-bit public keys.

    The server never has access to plaintext messages or unwrapped keys.


    ## WebSocket

    Real-time messaging uses a WebSocket connection at `/api/v1/ws`.

    See the WebSocket tag for protocol details.

    '
  version: 1.0.0
  contact:
    name: Concord
    url: https://github.com/Concord-Voice/Concord-Voice-Alpha
  license:
    name: CVSL 1.0
    url: https://github.com/Concord-Voice/Concord-Voice-Alpha/blob/main/LICENSE
servers:
- url: http://localhost:8080/api/v1
  description: Local development
- url: https://api.concordvoice.chat/api/v1
  description: Production
tags:
- name: Age Verification
  description: Identity-blind age-verification claim ingest (#1623, ADR-0025)
- name: Auth
  description: Registration, login, token management, logout
- name: Users
  description: User profile, E2EE keys, preferences
- name: Sessions
  description: Session listing and revocation
- name: Servers
  description: Server CRUD and management
- name: Channels
  description: Channel CRUD, read states, encryption keys
- name: Messages
  description: Send, edit, delete messages
- name: Members
  description: Server membership management
- name: Invites
  description: Server invite codes and joining
- name: E2EE
  description: End-to-end encryption key management
- name: Voice
  description: Voice channel participation and signaling
- name: DM
  description: Direct messages, group DMs, and DM voice calls
- name: Friends
  description: Friend requests, friend list, blocking
- name: FriendCodes
  description: Shareable friend codes for easy connections
- name: Privacy
  description: User privacy settings
- name: ChannelGroups
  description: Channel grouping and reordering within servers
- name: WebSocket
  description: Real-time WebSocket protocol
- name: Attestation
- name: GIFs
- name: MFA
- name: Media
- name: Notifications
- name: Platform
paths:
  /age/claim:
    put:
      tags:
      - Age Verification
      summary: Submit signed age-verification claim
      operationId: submitAgeClaim
      description: 'Identity-blind age-verification claim ingest (#1623, ADR-0025).

        Accepts a client RSA-PSS-signed claim carrying only booleans (valid_age 16+,
        nsfw_auth 18+) and a jurisdiction_obligation integer; no DOB, age value,
        jurisdiction name, or location is ever accepted or stored. The server
        reconstructs the canonical signing bytes from the authenticated request and
        verifies the signature against the user''s current public_keys entry; enforces
        an asymmetric freshness window + single-use nonce; persists one row per user;
        and on valid_age=false atomically and terminally disables the account.

        user_id is taken from the bearer token, never the body. The disabled-check runs
        before signature verification, so a disabled account can never submit a claim.

        Rate limit: 5 requests per minute (user-based). Requires a verified email.

        '
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - canonical_version
              - valid_age
              - nsfw_auth
              - jurisdiction_obligation
              - nonce
              - timestamp
              - key_version
              - client_version
              - signature
              properties:
                canonical_version:
                  type: integer
                  description: Must equal 1 (the only supported canonical form); authenticated inside the signed bytes.
                  example: 1
                valid_age:
                  type: boolean
                  description: True if the user is 16+. False atomically and terminally disables the account.
                nsfw_auth:
                  type: boolean
                  description: True if the user is 18+ (NSFW-eligible).
                jurisdiction_obligation:
                  type: integer
                  description: Jurisdiction obligation level, 0..2. No jurisdiction name is stored.
                  minimum: 0
                  maximum: 2
                nonce:
                  type: string
                  description: Single-use nonce, exactly 64 lowercase-hex chars (32 bytes).
                  pattern: '^[0-9a-f]{64}$'
                timestamp:
                  type: integer
                  format: int64
                  description: Unix seconds. Accepted within now-300s..now+30s.
                key_version:
                  type: integer
                  description: The public_keys key_version the claim was signed under; must match the user's current version.
                client_version:
                  type: string
                  description: Client version string, 1..32 chars from [0-9A-Za-z.+-].
                  example: 0.2.0
                signature:
                  type: string
                  description: Base64 RSA-PSS (salt length = 32) signature over the v1 canonical form.
      responses:
        '200':
          description: Claim accepted (and, on valid_age=false, account disabled)
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid_age:
                    type: boolean
                  nsfw_auth:
                    type: boolean
                  jurisdiction_obligation:
                    type: integer
                  last_change:
                    type: string
                    format: date-time
        '400':
          description: 'Malformed body or field-shape violation (error_code: malformed)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
        '401':
          description: 'Missing/invalid bearer token (error_code: unauthenticated)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
        '403':
          description: 'Caller already disabled (error_code: account_disabled)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
        '409':
          description: 'Nonce already used (error_code: replayed_nonce)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
        '422':
          description: 'no_signing_key / stale_key_version / invalid_signature / stale_timestamp'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          description: 'Redis/DB unavailable on a fail-closed check (error_code: unavailable)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
  /age/status:
    get:
      tags:
      - Age Verification
      summary: Read the caller's age-verification status
      operationId: getAgeStatus
      description: 'Identity-blind read-back of the authenticated user''s durable
        age-verification outcome (#1763). Returns only the eligibility booleans from
        age_verification_records — no DOB, age value, jurisdiction name, or location is
        exposed (the schema stores none; ADR-0025). Lets the client rehydrate the verified
        state on mount instead of re-prompting for a date of birth. user_id is taken from
        the bearer token, never the query, so the row is strictly per-user. A caller with
        no record reads back {verified:false}.

        Rate limit: 30 requests per minute (user-based). Requires a verified email.

        '
      security:
      - BearerAuth: []
      responses:
        '200':
          description: The caller's verification status (verified=false when no record exists)
          content:
            application/json:
              schema:
                type: object
                required:
                - verified
                - valid_age
                - nsfw_auth
                properties:
                  verified:
                    type: boolean
                    description: True if a verification record exists for the caller.
                  valid_age:
                    type: boolean
                    description: True if the caller is 16+. Always false when verified is false.
                  nsfw_auth:
                    type: boolean
                    description: True if the caller is 18+ (NSFW-eligible). Always false when verified is false.
        '401':
          description: 'Missing/invalid bearer token (error_code: unauthenticated)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          description: 'DB unavailable on the status read (error_code: unavailable)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
  /attestation/verify:
    post:
      tags:
      - Attestation
      summary: Verify client signals and issue an attestation token
      description: 'Validates client attestation signals (binary cert hash on macOS/Windows, machine ID

        on desktop platforms, SPA hash on all platforms) against the release registry and

        issues a short-lived attestation token bound to (session, machine). The token TTL

        is server-configured (default 2h). Fails closed (503) when the Redis registry is

        unavailable.

        '
      operationId: verifyClientAttestation
      security:
      - BearerAuth: []
      parameters:
      - name: X-Session-ID
        in: header
        required: true
        schema:
          type: string
        description: Session ID the issued attestation token is bound to
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttestationVerifyRequest'
      responses:
        '200':
          description: Attestation token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttestationVerifyResponse'
        '400':
          description: Missing X-Session-ID header, malformed body, or invalid platform
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Attestation rejected (unknown release, invalid signals, or revoked version)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttestationError'
        '503':
          description: Attestation registry (Redis) unavailable — fails closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/login:
    post:
      tags:
      - Auth
      summary: Log in
      description: 'Authenticate with email and password. Returns access token, user profile, and E2EE
        keys.

        Rate limit: 10 requests per 15 minutes (IP-based).

        Account locks after 5 failed attempts (escalating: 15m, 30m, 60m).

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  expires_in:
                    type: integer
                    example: 900
                  remember_me:
                    type: boolean
                  user:
                    $ref: '#/components/schemas/User'
                  e2ee_keys:
                    $ref: '#/components/schemas/E2EEKeys'
          headers:
            Set-Cookie:
              description: HttpOnly refresh token cookie
              schema:
                type: string
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '423':
          description: Account locked due to too many failed attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /auth/logout:
    post:
      tags:
      - Auth
      summary: Log out
      description: 'Invalidate the current session. Blacklists the access token in Redis.

        Rate limit: 10 requests per minute (IP-based).

        '
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '429':
          $ref: '#/components/responses/RateLimited'
  /auth/mfa/email/send:
    post:
      tags:
      - Auth
      summary: Send an email MFA code
      description: 'Send a 6-digit code to the user''s email for MFA verification. One email per challenge
        token.

        Rate limit: 3 requests per 15 minutes (IP-based).

        '
      operationId: authMfaEmailSend
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - mfa_challenge_token
              properties:
                mfa_challenge_token:
                  type: string
      responses:
        '200':
          description: Code sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  expires_in:
                    type: integer
                    example: 600
        '400':
          description: Missing challenge token or email MFA not enabled for this account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid or expired challenge token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Email code already sent for this challenge, or IP rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/mfa/verify:
    post:
      tags:
      - Auth
      summary: Verify an MFA challenge
      description: 'Validate a TOTP, backup code, WebAuthn assertion, or email code against an MFA challenge
        token issued at login.

        Identity comes from the challenge token (single-use). Per-user lockout after 5 failed attempts
        (15 minutes).

        Rate limit: 10 requests per 15 minutes (IP-based).

        '
      operationId: authMfaVerify
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFAVerifyRequest'
      responses:
        '200':
          description: 'MFA verified. For a login-purpose challenge the full login response is returned
            (with refresh cookie);

            for other purposes a `{verified, purpose, user_id}` acknowledgement is returned.

            '
          content:
            application/json:
              schema:
                oneOf:
                - type: object
                  description: Login completion (purpose = login)
                  properties:
                    access_token:
                      type: string
                    refresh_token:
                      type: string
                    session_id:
                      type: string
                      format: uuid
                    expires_in:
                      type: integer
                      example: 900
                    remember_me:
                      type: boolean
                    user:
                      $ref: '#/components/schemas/User'
                    e2ee_keys:
                      $ref: '#/components/schemas/E2EEKeys'
                - type: object
                  description: Non-login purposes (e.g. mfa_upgrade)
                  properties:
                    verified:
                      type: boolean
                    purpose:
                      type: string
                    user_id:
                      type: string
                      format: uuid
          headers:
            Set-Cookie:
              description: HttpOnly refresh token cookie (login purpose only)
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid, expired, or already-used MFA challenge token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Invalid MFA code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many failed attempts (per-user lockout) or IP rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/recovery/begin:
    post:
      tags:
      - Auth
      summary: Begin account recovery
      description: 'Send a 6-digit recovery code to the account email. Always returns 200 to prevent email
        enumeration.

        Rate limit: 3 requests per 15 minutes (IP-based).

        '
      operationId: recoveryBegin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Generic acknowledgement (sent whether or not the account exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimited'
  /auth/recovery/device-request:
    post:
      tags:
      - Auth
      summary: Create a trusted-device recovery request
      description: 'Create a recovery request (15-minute expiry) that a trusted device can approve. Requires
        a valid recovery token.

        Rate limit: 3 requests per 15 minutes (IP-based).

        '
      operationId: createDeviceRecoveryRequest
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecoveryRequestCreate'
      responses:
        '200':
          description: Recovery request created
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    format: uuid
        '400':
          description: Invalid body, no trusted devices configured, or malformed base64 ephemeral key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid or expired recovery token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /auth/recovery/device-request/{id}:
    get:
      tags:
      - Auth
      summary: Poll a trusted-device recovery request
      description: 'Poll request status. Recovery token is passed via `Authorization: Bearer` header or
        the `recovery_token` query parameter.

        Rate limit: 10 requests per 15 minutes (IP-based).

        '
      operationId: pollDeviceRecoveryRequest
      security: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Recovery request UUID
      - name: recovery_token
        in: query
        required: false
        schema:
          type: string
        description: Recovery token (alternative to the Authorization Bearer header)
      responses:
        '200':
          description: Current request status (`pending`, `approved`, `denied`, or `expired`)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  encrypted_payload:
                    type: string
                    format: byte
                    description: Present when status is approved
                  responder_public_key:
                    type: string
                    format: byte
                    description: Present when status is approved
        '400':
          description: Recovery token missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid or expired recovery token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Recovery request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /auth/recovery/reset-account:
    post:
      tags:
      - Auth
      summary: Full account reset via recovery token
      description: 'Reset password AND E2EE key material (new public key, channel/DM keys deleted — all
        encrypted history is lost).

        Requires acknowledge_data_loss=true. Rate limit: 3 requests per 15 minutes (IP-based).

        '
      operationId: recoveryResetAccount
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecoveryResetAccountRequest'
      responses:
        '200':
          description: Account reset — encrypted history permanently lost, sign in again
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          description: Invalid body, data loss not acknowledged, weak password, or malformed base64 key
            material
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid, expired, or already-used recovery token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /auth/recovery/reset-password:
    post:
      tags:
      - Auth
      summary: Reset password via recovery token
      description: 'Reset the password using a single-use recovery token, replacing the wrapped private
        key and revoking all refresh tokens.

        Rate limit: 5 requests per 15 minutes (IP-based).

        '
      operationId: recoveryResetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecoveryResetPasswordRequest'
      responses:
        '200':
          description: Password reset — all sessions revoked, sign in again
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          description: Invalid body, weak password, or malformed base64 key material
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid, expired, or already-used recovery token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /auth/recovery/social-request:
    post:
      tags:
      - Auth
      summary: Create a social recovery request
      description: 'Create a Shamir-secret-sharing recovery request (24-hour expiry) for the user''s recovery
        circle. Requires a valid recovery token.

        Rate limit: 3 requests per 15 minutes (IP-based).

        '
      operationId: createSocialRecoveryRequest
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecoveryRequestCreate'
      responses:
        '200':
          description: Social recovery request created
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    format: uuid
                  threshold_k:
                    type: integer
                    description: Guardian shares required to complete recovery
        '400':
          description: Invalid body, no recovery circle configured, or malformed base64 ephemeral key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid or expired recovery token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /auth/recovery/social-request/{id}:
    get:
      tags:
      - Auth
      summary: Poll a social recovery request
      description: 'Poll request status and guardian share progress. Recovery token via `Authorization:
        Bearer` header or `recovery_token` query parameter.

        Rate limit: 10 requests per 15 minutes (IP-based).

        '
      operationId: pollSocialRecoveryRequest
      security: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Social recovery request UUID
      - name: recovery_token
        in: query
        required: false
        schema:
          type: string
        description: Recovery token (alternative to the Authorization Bearer header)
      responses:
        '200':
          description: Current status (`pending`, `complete`, or `expired`); guardian responses included
            when complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  shares_received:
                    type: integer
                  threshold_k:
                    type: integer
                  responses:
                    type: array
                    description: Present when status is complete
                    items:
                      type: object
                      properties:
                        contact_id:
                          type: string
                          format: uuid
                        encrypted_share:
                          type: string
                          format: byte
        '400':
          description: Recovery token missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid or expired recovery token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Social recovery request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /auth/recovery/verify-code:
    post:
      tags:
      - Auth
      summary: Verify a recovery code
      description: 'Validate the emailed recovery code (single-use, max 5 attempts) and return a recovery
        token plus recovery key material.

        Rate limit: 5 requests per 15 minutes (IP-based).

        '
      operationId: recoveryVerifyCode
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              - code
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
                  description: 6-digit recovery code
      responses:
        '200':
          description: Code verified — recovery token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  recovery_token:
                    type: string
                  has_recovery_key:
                    type: boolean
                  recovery_wrapped_private_key:
                    type: string
                    format: byte
                    description: Present when has_recovery_key is true
                  recovery_key_salt:
                    type: string
                    format: byte
                    description: Present when has_recovery_key is true
                  recovery_wrapped_prefs_key:
                    type: string
                    format: byte
                  recovery_prefs_key_salt:
                    type: string
                    format: byte
                  has_trusted_devices:
                    type: boolean
                  has_recovery_circle:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid or expired recovery code
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  attempts_remaining:
                    type: integer
        '429':
          $ref: '#/components/responses/RateLimited'
  /auth/refresh:
    post:
      tags:
      - Auth
      summary: Refresh access token
      description: 'Exchange the HttpOnly refresh token cookie for a new access token.

        Implements single-use rotation with breach detection.

        Rate limit: 30 requests per minute (IP-based).

        '
      security:
      - CookieAuth: []
      responses:
        '200':
          description: New access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  expires_in:
                    type: integer
                    example: 900
          headers:
            Set-Cookie:
              description: New HttpOnly refresh token cookie (rotation)
              schema:
                type: string
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /auth/register:
    post:
      tags:
      - Auth
      summary: Register a new user (creates a pending registration)
      description: 'Start registration with E2EE key material. Creates a PENDING registration
        (#621, migration 000058) — the account is only promoted to a full user after the emailed
        verification code is submitted to /auth/register/confirm, which is the endpoint that
        returns tokens.

        Rate limit: 5 requests per 15 minutes (IP-based).

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Pending registration created; verification code emailed
          content:
            application/json:
              schema:
                type: object
                properties:
                  pending_id:
                    type: string
                    format: uuid
                  email:
                    type: string
                    format: email
                  expires_at:
                    type: string
                    format: date-time
                    description: Pending-registration expiry (15-minute TTL)
                  code_expires_at:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email or username already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /auth/register/change-email:
    post:
      tags:
      - Auth
      summary: Change the email on a pending registration
      description: 'Update the email address mid-registration, reset the resend counter, and send a fresh
        code to the new address.

        Rate limit: 10 requests per 15 minutes (IP-based).

        '
      operationId: changeRegistrationEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeRegistrationEmailRequest'
      responses:
        '200':
          description: Email updated and new code sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                    format: email
                  code_expires_at:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Pending registration not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationFlowError'
        '409':
          description: New email already registered (`email_already_registered`) or held by another pending
            registration (`registration_pending`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationFlowError'
        '410':
          description: Pending registration expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationFlowError'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          description: Verification email could not be sent to the new address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/register/confirm:
    post:
      tags:
      - Auth
      summary: Confirm a pending registration
      description: 'Validate the emailed verification code and promote the pending registration to a full
        user account.

        Rate limit: 10 requests per 15 minutes (IP-based).

        '
      operationId: confirmRegistration
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmRegistrationRequest'
      responses:
        '200':
          description: Registration confirmed — account created and session issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  session_id:
                    type: string
                    format: uuid
                  expires_in:
                    type: integer
                    example: 900
                  remember_me:
                    type: boolean
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      username:
                        type: string
                      email:
                        type: string
                        format: email
                      email_verified:
                        type: boolean
          headers:
            Set-Cookie:
              description: HttpOnly refresh token cookie
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Wrong verification code
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: invalid_code
                  attempts_remaining:
                    type: integer
        '404':
          description: Pending registration not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationFlowError'
        '410':
          description: Pending registration or verification code expired (`pending_expired` / `code_expired`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationFlowError'
        '429':
          description: Too many wrong-code attempts (`too_many_attempts`) or IP rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationFlowError'
  /auth/register/resend:
    post:
      tags:
      - Auth
      summary: Resend the registration verification code
      description: 'Re-send the email verification code for a pending registration, enforcing cooldown
        and max-resend limits.

        Rate limit: 20 requests per 15 minutes (IP-based).

        '
      operationId: resendRegistrationCode
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendRegistrationRequest'
      responses:
        '200':
          description: New code sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  code_expires_at:
                    type: string
                    format: date-time
                  resends_remaining:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Pending registration not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationFlowError'
        '410':
          description: Pending registration expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationFlowError'
        '429':
          description: Resends exhausted (`resends_exhausted`), cooldown active (`cooldown_active` with
            `retry_after_seconds`), or IP rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationFlowError'
        '503':
          description: Verification email could not be sent — retry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/register/{pending_id}:
    delete:
      tags:
      - Auth
      summary: Abandon a pending registration
      description: 'Delete a pending registration by ID so the user can start fresh.

        Rate limit: 20 requests per 15 minutes (IP-based).

        '
      operationId: abandonRegistration
      security: []
      parameters:
      - name: pending_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Pending registration UUID
      responses:
        '204':
          description: Pending registration deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Pending registration not found (no body)
        '429':
          $ref: '#/components/responses/RateLimited'
  /auth/sso/{provider}:
    get:
      tags:
      - Auth
      summary: Initiate an SSO flow
      description: 'Generate state, nonce, and PKCE verifier (10-minute TTL) and return the provider authorization
        URL.

        redirect_uri must be an RFC 8252 loopback (http://127.0.0.1/oauth/callback). Rate limit: 10 requests
        per 15 minutes (IP-based).

        '
      operationId: ssoInitiate
      security: []
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          type: string
          enum:
          - google
          - apple
        description: SSO provider name
      - name: redirect_uri
        in: query
        required: true
        schema:
          type: string
        description: Loopback redirect URI (must be http://127.0.0.1 with path /oauth/callback; explicit
          port required for apple)
      responses:
        '200':
          description: Authorization URL issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  auth_url:
                    type: string
                  state:
                    type: string
        '400':
          description: Invalid redirect_uri (`invalid_redirect_uri` with detail)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
        '404':
          description: Unknown provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          description: State store or apple-sso-bridge unavailable (`redis_unavailable` / `bridge_unavailable`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
  /auth/sso/{provider}/complete-link:
    post:
      tags:
      - Auth
      summary: Link an SSO identity to an existing account
      description: 'Prove ownership of the email-matched account with its password (shares the /auth/login
        lockout counter),

        then attach the SSO identity and issue a session. Rate limit: 5 requests per 15 minutes (IP-based).

        '
      operationId: ssoCompleteLink
      security: []
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          type: string
          enum:
          - google
          - apple
        description: SSO provider name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SSOCompleteLinkRequest'
      responses:
        '200':
          description: Account linked — session issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
          headers:
            Set-Cookie:
              description: HttpOnly refresh token cookie
              schema:
                type: string
        '400':
          description: Invalid body (`invalid_request`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
        '401':
          description: Invalid sso_token (`sso_token_invalid`) or wrong password (`invalid_credentials`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
        '423':
          description: Account locked after repeated failed password attempts (`account_locked`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
        '429':
          $ref: '#/components/responses/RateLimited'
  /auth/sso/{provider}/complete-registration:
    post:
      tags:
      - Auth
      summary: Finalize a new SSO-registered user
      description: 'Create the user account (username + passphrase + E2EE key material) from a single-use
        new-user sso_token.

        Rate limit: 5 requests per 15 minutes (IP-based).

        '
      operationId: ssoCompleteRegistration
      security: []
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          type: string
          enum:
          - google
          - apple
        description: SSO provider name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SSOCompleteRegistrationRequest'
      responses:
        '201':
          description: User created — session issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
          headers:
            Set-Cookie:
              description: HttpOnly refresh token cookie
              schema:
                type: string
        '400':
          description: Invalid body, username, password, or key material (`invalid_request` / `invalid_username`
            / `invalid_password` / `invalid_key_material`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
        '401':
          description: Invalid, expired, or already-used sso_token (`sso_token_invalid`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
        '409':
          description: Email or username already taken (`email_taken` / `username_taken`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
        '429':
          $ref: '#/components/responses/RateLimited'
  /auth/sso/{provider}/session:
    post:
      tags:
      - Auth
      summary: Create a session from a client-verified Apple or Google id_token
      description: 'Terminal server step of the client-driven OAuth exchange (apple #974, google #975):
        the desktop main process completes the provider code exchange itself and posts the resulting
        id_token for server-side re-verification (signature via JWKS, iss/aud/exp/iat, nonce binding
        against the single-use state record) — the server never trusts client-side verification.
        Response shapes are identical across providers. Accepts apple or google; 404 for any other
        provider. Rate limit: 10 requests per 15 minutes (IP-based).

        '
      operationId: ssoProviderSession
      security: []
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          type: string
          enum:
          - apple
          - google
        description: apple or google (404 for any other provider)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - id_token
              - state
              properties:
                id_token:
                  type: string
                  description: Provider id_token (apple or google) obtained by the desktop-driven code exchange
                state:
                  type: string
                  description: Single-use state value returned by the initiate step
                apple_user_data:
                  type: string
                  description: Apple-only opaque "user" blob from the first-auth callback (display-name
                    suggestion)
      responses:
        '200':
          description: 'Verification succeeded — one of four shapes (callback parity): existing-SSO
            session (`access_token` + refresh cookie), existing-SSO MFA challenge, account-link offer,
            or new-user registration handoff.

            '
          content:
            application/json:
              schema:
                oneOf:
                - type: object
                  description: Existing SSO identity — session issued
                  properties:
                    access_token:
                      type: string
                - type: object
                  description: Existing SSO identity — MFA required
                  properties:
                    mfa_challenge_token:
                      type: string
                    methods:
                      type: array
                      items:
                        type: string
                    recovery_only_methods:
                      type: array
                      items:
                        type: string
                    webauthn_options:
                      type: object
                - type: object
                  description: Verified email matches an existing account
                  properties:
                    account_link_available:
                      type: boolean
                    sso_token:
                      type: string
                    masked_email:
                      type: string
                - type: object
                  description: New user — registration required
                  properties:
                    sso_registration_required:
                      type: boolean
                    sso_token:
                      type: string
                    email:
                      type: string
                    name:
                      type: string
          headers:
            Set-Cookie:
              description: HttpOnly refresh token cookie (session-issued branch only)
              schema:
                type: string
        '400':
          description: Invalid body or oversized state (`invalid_request`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
        '401':
          description: State validation failed (`invalid_state` — restart the flow) or id_token verification
            failed (`invalid_id_token` — never retry this token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
        '403':
          description: Apple reports the email as unverified (`oauth_email_unverified`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
        '404':
          description: Unknown or non-Apple provider (`unknown_provider`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
        '429':
          $ref: '#/components/responses/RateLimited'
  /auth/sso/{provider}/sign-client-secret:
    post:
      tags:
      - Auth
      summary: Mint an Apple client_secret (broker)
      description: 'Sign a short-lived Apple client_secret JWT for the client-driven Apple token exchange
        (#972).

        Authorized by a valid, unconsumed sso_state (one-shot); only provider=apple is accepted.

        Rate limit: 5 requests per minute (IP-based).

        '
      operationId: ssoSignAppleClientSecret
      security: []
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          type: string
          enum:
          - apple
        description: Must be apple — other providers return 404
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - state
              properties:
                state:
                  type: string
                  description: State value from the initiate step (max 256 chars)
      responses:
        '200':
          description: Client secret minted (one per state)
          content:
            application/json:
              schema:
                type: object
                properties:
                  client_secret:
                    type: string
                  expires_in:
                    type: integer
                    description: Seconds until the minted client_secret expires
        '401':
          description: Uniform rejection for any invalid/expired/replayed state (`invalid_state`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
        '404':
          description: Unknown or non-apple provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          description: State store unavailable (`redis_unavailable`) or signing failure (`internal_error`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSOError'
  /auth/ws-ticket:
    post:
      tags:
      - Auth
      summary: Issue a WebSocket ticket
      description: 'Generate a short-lived, single-use ticket for WebSocket authentication.

        The ticket is valid for 30 seconds and can only be used once.

        Rate limit: 10 requests per minute.

        '
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Ticket issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticket:
                    type: string
                    description: Single-use ticket (30s TTL)
        '429':
          $ref: '#/components/responses/RateLimited'
  /categories/{id}/overrides:
    get:
      tags:
      - ChannelGroups
      summary: List category permission overrides
      description: 'Return all SBAC permission overrides for a category (channel group),

        ordered by target type then creation time. Requires the Manage Channels

        permission. Rate limit: 30 requests per minute (user-based).

        '
      operationId: listCategoryOverrides
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Category (channel group) UUID
      responses:
        '200':
          description: Permission overrides for the category
          content:
            application/json:
              schema:
                type: object
                properties:
                  overrides:
                    type: array
                    items:
                      $ref: '#/components/schemas/CategoryOverride'
        '400':
          description: Invalid category ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions (Manage Channels required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
    put:
      tags:
      - ChannelGroups
      summary: Create or update a category permission override
      description: 'Upsert an SBAC permission override for a user or role on a category

        (keyed on category + target type + target ID). Requires the Manage

        Channels permission. Allow bits must be a subset of the caller''s own

        effective permissions unless the caller has Administrator (deny bits

        are exempt). The change cascades to permission-synced child channels

        and invalidates their permission caches.

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: upsertCategoryOverride
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Category (channel group) UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertOverrideRequest'
      responses:
        '200':
          description: Override created or updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  override:
                    $ref: '#/components/schemas/CategoryOverride'
        '400':
          description: Invalid category ID or request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions (Manage Channels required), or the allow bits include
            permissions the caller does not hold
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /categories/{id}/overrides/{override_id}:
    delete:
      tags:
      - ChannelGroups
      summary: Delete a category permission override
      operationId: deleteCategoryOverride
      description: 'Remove a category permission override. Requires the Manage Channels

        permission. Cascades the delete to permission-synced child channels.

        Rate limit: 10 requests per minute (user-based).

        '
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Category (channel group) UUID
      - name: override_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Override UUID
      responses:
        '200':
          description: Override deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          description: Invalid category or override ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller lacks the Manage Channels permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Category or override not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /channels:
    post:
      tags:
      - Channels
      summary: Create a channel
      description: 'Create a channel in a server. Requires owner or admin role.

        For encrypted channels, provide wrapped_keys mapping user IDs to wrapped CSKs.

        Rate limit: 10 requests per minute.

        '
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChannelRequest'
      responses:
        '201':
          description: Channel created
          content:
            application/json:
              schema:
                type: object
                properties:
                  channel:
                    $ref: '#/components/schemas/Channel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /channels/{id}:
    get:
      tags:
      - Channels
      summary: Get a channel
      description: 'Rate limit: 30 requests per minute.'
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ChannelId'
      responses:
        '200':
          description: Channel details
          content:
            application/json:
              schema:
                type: object
                properties:
                  channel:
                    $ref: '#/components/schemas/Channel'
    patch:
      tags:
      - Channels
      summary: Update a channel
      description: 'Update channel name, type, and emoji. Encryption status cannot be changed.

        Requires owner or admin role.

        Rate limit: 10 requests per minute.

        '
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ChannelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateChannelRequest'
      responses:
        '200':
          description: Channel updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  channel:
                    $ref: '#/components/schemas/Channel'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
      - Channels
      summary: Delete a channel
      description: 'Permanently delete a channel. Requires owner or admin role.

        Rate limit: 5 requests per minute.

        '
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ChannelId'
      responses:
        '200':
          description: Channel deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /channels/{id}/keys:
    get:
      tags:
      - E2EE
      summary: Get channel encryption key
      description: 'Get the caller''s wrapped channel symmetric key (CSK) for an encrypted channel.

        Returns 404 with `pending: true` if the key has not yet been distributed.

        Rate limit: 30 requests per minute.

        '
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ChannelId'
      responses:
        '200':
          description: Channel key
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    $ref: '#/components/schemas/ChannelKey'
        '404':
          description: Key not yet distributed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: No encryption key available yet
                  pending:
                    type: boolean
                    example: true
    post:
      tags:
      - E2EE
      summary: Distribute channel keys
      description: 'Distribute wrapped CSKs to new members. The caller must already have a key for this
        channel.

        First-response-wins on duplicates.

        Rate limit: 10 requests per minute.

        '
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ChannelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DistributeKeysRequest'
      responses:
        '200':
          description: Keys distributed
          content:
            application/json:
              schema:
                type: object
                properties:
                  distributed:
                    type: integer
                  duplicates:
                    type: integer
  /channels/{id}/messages:
    get:
      tags:
      - Messages
      summary: Get message history
      description: 'Retrieve messages for a channel with cursor-based pagination.

        Messages are returned newest-first.

        Rate limit: 30 requests per minute.

        '
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ChannelId'
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
      - name: before
        in: query
        description: Message UUID for cursor pagination (get messages before this ID)
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/MessageWithUser'
                  count:
                    type: integer
  /channels/{id}/messages/bulk:
    get:
      tags:
      - Messages
      summary: Bulk message fetch
      description: 'Message history with a larger page size (up to 200) for client search backfill.

        Cursor pagination, newest-first. Requires Read Message History.

        Rate limit: 20 requests per minute.

        '
      operationId: getChannelMessagesBulk
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ChannelId'
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 200
      - name: before
        in: query
        description: Message UUID for cursor pagination (get messages before this ID)
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/MessageWithUser'
                  count:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Not a member of the channel's server or insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /channels/{id}/overrides:
    get:
      tags:
      - Channels
      summary: List channel permission overrides
      description: 'Return all SBAC permission overrides for a channel, ordered by target type

        then creation time. Requires the Manage Channels permission (prevents

        leaking access-control information to regular members).

        Rate limit: 30 requests per minute (user-based).

        '
      operationId: listChannelOverrides
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ChannelId'
      responses:
        '200':
          description: Permission overrides for the channel
          content:
            application/json:
              schema:
                type: object
                properties:
                  overrides:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChannelOverride'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Insufficient permissions (Manage Channels required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
    put:
      tags:
      - Channels
      summary: Create or update a channel permission override
      description: 'Upsert an SBAC permission override for a user or role on a channel

        (keyed on channel + target type + target ID). Requires the Manage

        Channels permission. Allow bits must be a subset of the caller''s own

        effective permissions unless the caller has Administrator (deny bits

        are exempt — they remove permissions rather than grant them).

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: upsertChannelOverride
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ChannelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertOverrideRequest'
      responses:
        '200':
          description: Override created or updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  override:
                    $ref: '#/components/schemas/ChannelOverride'
        '400':
          description: Invalid channel ID or request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions (Manage Channels required), or the allow bits include
            permissions the caller does not hold
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /channels/{id}/overrides/{override_id}:
    delete:
      tags:
      - Channels
      summary: Delete a channel permission override
      description: 'Delete a single SBAC permission override from a channel. Requires the Manage Channels
        permission.

        Rate limit: 10 requests per minute.

        '
      operationId: deleteChannelOverride
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ChannelId'
      - name: override_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Permission override UUID
      responses:
        '200':
          description: Override deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Insufficient permissions (Manage Channels required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Channel or override not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /channels/{id}/permission-sync:
    put:
      tags:
      - Channels
      summary: Set channel permission sync
      description: 'Enable or disable syncing a channel''s permission overrides from its parent category.

        Enabling copies the category''s overrides onto the channel. Requires the Manage Channels permission.

        Rate limit: 10 requests per minute.

        '
      operationId: setChannelPermissionSync
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ChannelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sync_permissions:
                  type: boolean
                  description: True to inherit overrides from the parent category
      responses:
        '200':
          description: Sync flag updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  sync_permissions:
                    type: boolean
        '400':
          description: Invalid channel ID or body, or channel is not in a category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions (Manage Channels required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /channels/{id}/permissions:
    get:
      tags:
      - Channels
      summary: Get my effective channel permissions
      description: 'Return the authenticated user''s effective permissions bitfield for a channel

        (role permissions plus channel/category SBAC overrides).

        Rate limit: 30 requests per minute.

        '
      operationId: getMyChannelPermissions
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ChannelId'
      responses:
        '200':
          description: Effective permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  permissions:
                    type: integer
                    format: int64
                    description: Permission bitfield
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /channels/{id}/pins:
    get:
      tags:
      - Messages
      summary: Get pinned messages
      description: 'All pinned messages for a server channel or DM conversation (the path ID resolves
        to either),

        newest pin first. For DM conversations the items carry `conversation_id` and `type` instead of

        `channel_id`, and the top-level `conversation_id` is set.

        Rate limit: 30 requests per minute.

        '
      operationId: getChannelPins
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Channel UUID or DM conversation UUID
      responses:
        '200':
          description: Pinned messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  pinned_messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/MessageWithUser'
                  count:
                    type: integer
                  conversation_id:
                    type: string
                    format: uuid
                    description: Present only when the ID resolved to a DM conversation
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Not a member of the channel's server or insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No channel or accessible DM conversation with this ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /channels/{id}/read:
    post:
      tags:
      - Channels
      summary: Mark channel as read
      description: 'Rate limit: 30 requests per minute.'
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ChannelId'
      responses:
        '200':
          description: Channel marked as read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
  /channels/{id}/rotate-key:
    post:
      tags:
      - E2EE
      summary: Rotate channel encryption key
      description: 'Initiate a key rotation for an encrypted channel. Increments the

        key version; members must re-distribute wrapped keys.

        Rate limit: 10 requests per 24 hours (per channel, Redis INCR+EXPIRE).

        '
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ChannelId'
      responses:
        '200':
          description: Key rotation initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Key rotation initiated
                  new_key_version:
                    type: integer
        '403':
          description: Not authorized (must be server owner or admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /channels/{id}/voice/authorize-action:
    post:
      tags:
      - Voice
      summary: Authorize a voice moderation action
      description: 'Check whether the caller may perform a voice moderation action (mute, deafen, move)
        on a

        target user in this channel. Enforces the action''s permission and role hierarchy; called

        by clients before the media plane executes moderation commands.

        Rate limit: 10 requests per minute.

        '
      operationId: authorizeVoiceAction
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ChannelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - action
              - target_user_id
              properties:
                action:
                  type: string
                  enum:
                  - mute
                  - deafen
                  - move
                target_user_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Action authorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  allowed:
                    type: boolean
                    example: true
                  action:
                    type: string
                    enum:
                    - mute
                    - deafen
                    - move
                  target_id:
                    type: string
                    format: uuid
                  channel_id:
                    type: string
                    format: uuid
        '400':
          description: Invalid channel ID or body, or target user is not a member of this server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a member, insufficient permissions, or target has equal/higher role position
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /channels/{id}/voice/join:
    post:
      tags:
      - Voice
      summary: Join a voice channel
      description: 'Request permission to join a voice channel and receive media server

        connection details including ICE servers for NAT traversal.

        Rate limit: 10 requests per minute (user-based).

        '
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ChannelId'
      responses:
        '200':
          description: Join approved with connection details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoiceJoinResponse'
        '403':
          description: Not a member of this channel's server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /channels/{id}/voice/participants:
    get:
      tags:
      - Voice
      summary: List voice channel participants
      description: 'Get the list of users currently connected to this voice channel.

        Rate limit: 30 requests per minute (user-based).

        '
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ChannelId'
      responses:
        '200':
          description: Participants list
          content:
            application/json:
              schema:
                type: object
                properties:
                  participants:
                    type: array
                    items:
                      $ref: '#/components/schemas/VoiceParticipant'
        '403':
          description: Not a member of this channel's server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /client/config:
    get:
      tags:
      - Platform
      summary: Get client configuration
      description: 'Public pre-auth endpoint serving dynamic client configuration: minimum client

        version, feature flags, media-plane URL, TURN info, and remote SPA hot-update

        pointers. Responses carry `Cache-Control: no-store` so clients always see new

        SPA builds. Rate limit: 30 requests per minute (IP-based).

        '
      operationId: getClientConfig
      security: []
      responses:
        '200':
          description: Current client configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientConfig'
        '429':
          $ref: '#/components/responses/RateLimited'
  /server/capabilities:
    get:
      tags:
      - Platform
      summary: Discover server capabilities
      description: 'Public pre-auth endpoint advertising server auth options and feature

        surface so clients can render the correct login form and clamp their feature

        set before login (version skew). Response is identical regardless of auth

        state. Cache-Control: public, max-age=300. Rate limit: 10 requests per minute

        (IP-based). Schema is additively-evolvable (new fields optional).

        '
      operationId: getServerCapabilities
      security: []
      responses:
        '200':
          description: Server capability descriptor
          content:
            application/json:
              schema:
                type: object
                required:
                - server
                - auth
                - features
                - policyVersion
                properties:
                  server:
                    type: object
                    required:
                    - name
                    - version
                    - instanceType
                    properties:
                      name:
                        type: string
                      version:
                        type: string
                      instanceType:
                        type: string
                        enum:
                        - saas
                        - self-hosted
                  auth:
                    type: object
                    required:
                    - emailVerificationRequired
                    - mfaEnabled
                    - mfaMethods
                    - oauthProviders
                    - ldapEnabled
                    - samlEnabled
                    properties:
                      emailVerificationRequired:
                        type: boolean
                      mfaEnabled:
                        type: boolean
                      mfaMethods:
                        type: array
                        items:
                          type: string
                      oauthProviders:
                        type: array
                        items:
                          type: string
                      ldapEnabled:
                        type: boolean
                      samlEnabled:
                        type: boolean
                  features:
                    type: object
                    required:
                    - voiceTiersSupported
                    - e2eeEnforcedEverywhere
                    - maxMembersPerServer
                    - entitlementMode
                    properties:
                      voiceTiersSupported:
                        type: boolean
                      e2eeEnforcedEverywhere:
                        type: boolean
                      maxMembersPerServer:
                        type: integer
                      entitlementMode:
                        type: string
                        enum:
                        - saas
                        - self-hosted-unlocked
                  policyVersion:
                    type: string
        '429':
          $ref: '#/components/responses/RateLimited'
  /dm/conversations:
    get:
      tags:
      - DM
      summary: List DM conversations
      description: 'Get all DM conversations for the authenticated user, including

        last message preview and unread count.

        Rate limit: 30 requests per minute (user-based).

        '
      operationId: listDMConversations
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Conversations list
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversations:
                    type: array
                    items:
                      $ref: '#/components/schemas/DMConversation'
    post:
      tags:
      - DM
      summary: Open a 1-on-1 DM conversation
      description: 'Open or get an existing 1-on-1 DM conversation with another user.

        Returns 200 if conversation already exists, 201 if newly created.

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: openDMConversation
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - user_id
              properties:
                user_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Existing conversation returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation:
                    $ref: '#/components/schemas/DMConversation'
        '201':
          description: New conversation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation:
                    $ref: '#/components/schemas/DMConversation'
        '400':
          description: Missing or invalid user_id, or attempting to open a DM with yourself
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Target's DM privacy settings block the conversation (`dm_disabled` / `privacy_blocked`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Target user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /dm/conversations/group:
    post:
      tags:
      - DM
      summary: Create a group DM
      description: 'Create a group DM conversation with 2-10 participants (including yourself).

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: createDMGroupConversation
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - user_ids
              properties:
                user_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  minItems: 1
                  maxItems: 9
                name:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Group DM created
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation:
                    $ref: '#/components/schemas/DMConversation'
        '400':
          description: Missing/empty user_ids, more than 9 other participants, a non-UUID user ID, or
            including yourself in user_ids
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /dm/conversations/personal:
    post:
      tags:
      - DM
      summary: Create a personal notes conversation
      description: 'Create or get a personal notes conversation (DM with yourself).

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: getOrCreatePersonalDMConversation
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Existing personal conversation
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation:
                    $ref: '#/components/schemas/DMConversation'
        '201':
          description: New personal conversation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation:
                    $ref: '#/components/schemas/DMConversation'
  /dm/conversations/{id}:
    get:
      tags:
      - DM
      summary: Get a DM conversation
      description: 'Get details of a specific DM conversation.

        Rate limit: 30 requests per minute (user-based).

        '
      operationId: getDMConversation
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Conversation UUID
      responses:
        '200':
          description: Conversation details
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation:
                    $ref: '#/components/schemas/DMConversation'
        '400':
          description: Invalid conversation ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags:
      - DM
      summary: Update a DM conversation
      description: 'Update conversation settings (e.g., group name). Groups only; admin role required.

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: updateDMConversation
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Conversation updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          description: Invalid conversation ID or request body, or conversation is not a group (cannot
            rename a 1:1 conversation)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a participant, or not a group admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
      - DM
      summary: Delete a group DM
      description: 'Permanently delete a group DM conversation and all associated data (admin only, groups
        only).

        Rate limit: 5 requests per minute (user-based).

        '
      operationId: deleteDMGroupConversation
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Conversation UUID
      responses:
        '200':
          description: Group deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          description: Invalid conversation ID, or conversation is not a group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a participant, or not a group admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /dm/conversations/{id}/keys:
    get:
      tags:
      - DM
      summary: Get DM encryption key
      description: 'Get the wrapped E2EE key for a DM conversation.

        Rate limit: 30 requests per minute (user-based).

        '
      operationId: getDMEncryptionKey
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Wrapped key
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    $ref: '#/components/schemas/DMKey'
        '400':
          description: Invalid conversation ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Conversation not found, or no encryption key available yet (response carries a
            true `pending` flag in the no-key case)
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                properties:
                  error:
                    type: string
                  pending:
                    type: boolean
                    description: Present (true) when the conversation exists but no key has been distributed
                      yet
    post:
      tags:
      - DM
      summary: Distribute DM encryption keys
      description: 'Distribute wrapped E2EE keys to DM conversation participants.

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: distributeDMKeys
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - wrapped_keys
              properties:
                wrapped_keys:
                  type: object
                  additionalProperties:
                    type: string
                  description: Map of user_id → base64-encoded wrapped key
                key_version:
                  type: integer
      responses:
        '200':
          description: Keys distributed
          content:
            application/json:
              schema:
                type: object
                properties:
                  distributed:
                    type: integer
        '400':
          description: Invalid conversation ID or request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /dm/conversations/{id}/members:
    post:
      tags:
      - DM
      summary: Add a member to a group DM
      description: 'Add a user to a group DM conversation (admin only, groups only, 10-member cap).

        The target''s DM privacy settings are enforced before adding. If the conversation

        has existing E2EE key material, the current key epoch is revoked

        (reason `member_added`) and a `key_rotation` WebSocket event is broadcast so

        existing participants re-wrap keys at the successor epoch. Existing participants

        receive `dm_participant_added`; the new member receives `dm_conversation_created`.

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: addDMGroupMember
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Conversation UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - user_id
              properties:
                user_id:
                  type: string
                  format: uuid
                  description: User to add to the group
      responses:
        '200':
          description: Member added; returns the updated conversation
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation:
                    $ref: '#/components/schemas/DMConversation'
        '400':
          description: Invalid conversation ID, request body, or user_id; target user not found; conversation
            is not a group; or the group is at its 10-member limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is not a participant, is not a group admin, or the target's DM privacy settings
            block the addition (`dm_disabled` / `privacy_blocked`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: User is already a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /dm/conversations/{id}/members/{userId}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Conversation ID
    - name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Target participant user ID
    delete:
      tags:
      - Direct Messages
      summary: Remove a member from a group DM (or leave when targeting yourself)
      description: 'Group conversations only. Admins may remove other members; any participant may remove
        themselves (self-leave). The group creator can only be removed via self-leave. Rate limit: 10
        requests/min per user.'
      operationId: removeDMGroupMember
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Member removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Member removed
        '400':
          description: Invalid conversation/user ID, not a group conversation, or target is not a participant
          content:
            application/json:
              schema: &id001
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is not a participant, is not an admin (when removing others), or attempted
            to remove the group creator
          content:
            application/json:
              schema: *id001
    patch:
      tags:
      - Direct Messages
      summary: Change a group DM participant's role
      description: 'Group conversations only; admins only. The group creator cannot be demoted, and callers
        cannot change their own role. Rate limit: 10 requests/min per user.'
      operationId: updateDMGroupMemberRole
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - role
              properties:
                role:
                  type: string
                  enum:
                  - admin
                  - member
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Role updated
                  user_id:
                    type: string
                    format: uuid
                  role:
                    type: string
                    enum:
                    - admin
                    - member
        '400':
          description: Invalid IDs/body, invalid role value, own-role change, non-group conversation,
            or target not a participant
          content:
            application/json:
              schema: *id001
        '403':
          description: Caller is not a participant, not an admin, or attempted to demote the group creator
          content:
            application/json:
              schema: *id001
  /dm/conversations/{id}/messages:
    get:
      tags:
      - DM
      summary: Get DM message history
      description: 'Get messages in a DM conversation with cursor-based pagination.

        Rate limit: 30 requests per minute (user-based).

        '
      operationId: getDMMessages
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: before
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Cursor — message ID to fetch messages before
      responses:
        '200':
          description: Messages list
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/DMMessage'
        '400':
          description: Invalid conversation ID or cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /dm/conversations/{id}/messages/{message_id}:
    patch:
      tags:
      - DM
      summary: Edit a DM message
      description: 'Edit your own DM message. Content must be base64-encoded AES-256-GCM ciphertext

        (all DMs are encrypted under the E2EE-everywhere posture, #201).

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: updateDMMessage
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Conversation UUID
      - name: message_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Message UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - content
              properties:
                content:
                  type: string
                  description: Base64-encoded ciphertext (decoded length must be at least 28 bytes)
      responses:
        '200':
          description: Message updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      content:
                        type: string
                      key_version:
                        type: integer
                      edited_at:
                        type: string
                        format: date-time
                        nullable: true
                      created_at:
                        type: string
                        format: date-time
        '400':
          description: Invalid conversation/message ID, invalid request body, or invalid ciphertext format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a participant, or not the message author
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Message not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
      - DM
      summary: Delete a DM message
      description: 'Delete your own DM message.

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: deleteDMMessage
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Conversation UUID
      - name: message_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Message UUID
      responses:
        '200':
          description: Message deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '400':
          description: Invalid conversation or message ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a participant, or not the message author
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Message not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /dm/conversations/{id}/read:
    post:
      tags:
