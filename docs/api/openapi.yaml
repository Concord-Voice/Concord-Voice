  /internal/attestation/publish/binary:
    post:
      tags:
      - Attestation
      summary: Publish binary release attestation hashes (CI only)
      description: 'Internal CI endpoint. Records the (version, platform, cert_hash) triple for a signed

        desktop binary. Authenticated by a GitHub Actions OIDC ID token in the Authorization

        Bearer header (verified in-handler — NOT a user JWT); only tokens minted by

        build-desktop.yml are accepted. Re-publishing the same version+platform with the

        same hash is an idempotent upsert (201).

        '
      operationId: publishBinaryAttestation
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttestationPublishBinaryRequest'
      responses:
        '201':
          description: Binary attestation recorded (idempotent upsert)
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                  platform:
                    $ref: '#/components/schemas/AttestationPlatform'
                required:
                - version
                - platform
        '400':
          description: Malformed body, invalid platform, or cert_hash not matching sha256:<64 lowercase
            hex>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing bearer token or OIDC verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Hash mismatch for an already-published version+platform (potential supply-chain
            incident)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: OIDC verifier unavailable — publish endpoint disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /internal/attestation/publish/spa:
    post:
      tags:
      - Attestation
      summary: Publish SPA release attestation hashes (CI only)
      description: 'Internal CI endpoint. Records the (spa_version, html_hash) pair for a deployed SPA

        bundle. Authenticated by a GitHub Actions OIDC ID token in the Authorization Bearer

        header (verified in-handler against workflow ref, audience, and subject — NOT a user

        JWT); only tokens minted by main-cd.yml are accepted. Re-publishing the same

        spa_version with the same hash is an idempotent upsert (201).

        '
      operationId: publishSpaAttestation
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttestationPublishSPARequest'
      responses:
        '201':
          description: SPA attestation recorded (idempotent upsert)
          content:
            application/json:
              schema:
                type: object
                properties:
                  spa_version:
                    type: string
                required:
                - spa_version
        '400':
          description: Malformed body or html_hash not matching sha256:<64 lowercase hex>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing bearer token or OIDC verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Hash mismatch for an already-published spa_version (potential supply-chain incident)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: OIDC verifier unavailable — publish endpoint disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
