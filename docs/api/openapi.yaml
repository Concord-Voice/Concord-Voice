                    type: array
                    items:
                      $ref: '#/components/schemas/ReactionSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Not a member of the channel's server or insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Message not found (includes DM messages, which this endpoint does not support)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /messages/{id}/suppress-embeds:
    post:
      tags:
      - Messages
      summary: Suppress embeds on a message
      description: 'Hide link embeds on a message (one-way: embeds cannot be re-enabled). Requires the

        Manage All Messages permission. Idempotent — already-suppressed messages return 200.

        Rate limit: 10 requests per minute.

        '
      operationId: suppressMessageEmbeds
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Message UUID
      responses:
        '200':
          description: Embeds suppressed (or already suppressed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Insufficient permissions (Manage All Messages required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Message not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /mfa/backup-codes/regenerate:
    post:
      tags:
      - MFA
      summary: Regenerate backup codes
      description: 'Replaces all backup codes. Requires password and a current TOTP code

        (backup codes are not accepted here).

        Rate limit: 3 requests per minute (user-based).

        '
      operationId: mfaRegenerateBackupCodes
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - password
              - code
              properties:
                password:
                  type: string
                code:
                  type: string
                  description: Current TOTP code from the authenticator app
      responses:
        '200':
          description: New backup codes
          content:
            application/json:
              schema:
                type: object
                properties:
                  backup_codes:
                    type: array
                    items:
                      type: string
        '400':
          description: Missing fields, or TOTP is not enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Incorrect password or invalid TOTP code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /mfa/backup-email:
    get:
      tags:
      - MFA
      summary: Get backup email
      description: 'Rate limit: 10 requests per minute (user-based).'
      operationId: mfaGetBackupEmail
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Backup email (empty string when unset)
          content:
            application/json:
              schema:
                type: object
                properties:
                  backup_email:
                    type: string
    put:
      tags:
      - MFA
      summary: Set or clear backup email
      description: 'Sets the recovery backup email. Send an empty string to clear it.

        Rate limit: 5 requests per minute (user-based).

        '
      operationId: mfaSetBackupEmail
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: Email address, or empty string to clear
      responses:
        '200':
          description: Backup email updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  backup_email:
                    type: string
        '400':
          description: Invalid email address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /mfa/email-sms/disable:
    post:
      tags:
      - MFA
      summary: Disable email/SMS MFA methods
      description: 'Removes both email and SMS MFA methods and clears them from

        recovery-only settings. Idempotent.

        Rate limit: 3 requests per minute (user-based).

        '
      operationId: mfaEmailSmsDisable
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Methods disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
  /mfa/email-sms/setup:
    post:
      tags:
      - MFA
      summary: Begin email/SMS MFA setup
      description: 'Sends verification codes for the requested methods (codes expire after

        10 minutes). Requires an already-active standard MFA method. Email codes

        are delivered via the email service; SMS is dev-only (403 in production).

        In non-production, SMS codes are returned in the response (`dev_codes`).

        Rate limit: 5 requests per minute (user-based).

        '
      operationId: mfaEmailSmsSetup
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - password
              - methods
              properties:
                password:
                  type: string
                mfa_code:
                  type: string
                  description: Required when MFA is already active
                methods:
                  type: array
                  items:
                    type: string
                    enum:
                    - email
                    - sms
      responses:
        '200':
          description: Verification codes sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  methods:
                    type: array
                    items:
                      type: string
                  expires_in:
                    type: string
                    example: 10 minutes
                  dev_codes:
                    type: object
                    additionalProperties:
                      type: string
                    description: Non-production only — generated SMS code(s)
                  dev_mode:
                    type: boolean
                    description: Non-production only
        '400':
          description: Invalid methods, or no standard MFA method is active yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: SMS MFA unavailable in production, or incorrect password / MFA code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /mfa/email-sms/status:
    get:
      tags:
      - MFA
      summary: Get email/SMS MFA status
      description: 'Rate limit: 10 requests per minute (user-based).'
      operationId: mfaEmailSmsStatus
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Method status
          content:
            application/json:
              schema:
                type: object
                properties:
                  email_enabled:
                    type: boolean
                  sms_enabled:
                    type: boolean
  /mfa/email-sms/verify:
    post:
      tags:
      - MFA
      summary: Verify email/SMS codes and activate methods
      description: 'Verifies the pending code(s) and activates the corresponding method(s).

        In hardened recovery mode, both email AND sms codes must be provided.

        Rate limit: 5 requests per minute (user-based).

        '
      operationId: mfaEmailSmsVerify
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - codes
              properties:
                codes:
                  type: object
                  additionalProperties:
                    type: string
                  description: 'Map of method → code, e.g. {"email": "123456"}'
      responses:
        '200':
          description: Methods activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  verified:
                    type: array
                    items:
                      type: string
        '400':
          description: Codes missing, invalid method, no pending code, or hardened mode requires both
            channels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Invalid code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /mfa/recovery-circle:
    get:
      tags:
      - MFA
      summary: Get the recovery circle configuration
      description: 'Returns the user''s social recovery circle: Shamir threshold parameters,

        share version, and the contacts holding shares for the current version.

        Encrypted shares are never returned to the circle owner.

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: mfaGetRecoveryCircle
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Recovery circle configuration (has_circle is false when none is configured; the
            remaining fields are present only when has_circle is true)
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_circle:
                    type: boolean
                  threshold_k:
                    type: integer
                    description: Shares required to recover (Shamir threshold)
                  total_shares_n:
                    type: integer
                    description: Total shares distributed
                  share_version:
                    type: integer
                    description: Increments on every circle reconfiguration
                  created_at:
                    type: string
                    format: date-time
                  contacts:
                    type: array
                    items:
                      type: object
                      properties:
                        user_id:
                          type: string
                          format: uuid
                        username:
                          type: string
                        display_name:
                          type: string
    put:
      tags:
      - MFA
      summary: Create or update the recovery circle
      description: 'Upserts the user''s social recovery circle with client-side-generated

        Shamir shares, each encrypted to one contact. Requires password (and an

        MFA code if MFA is active). Constraints: `threshold_k` >= 2 and

        <= `total_shares_n`; `total_shares_n` <= 7; the shares array length must

        equal `total_shares_n`; `share_index` values must be unique and in

        1..`total_shares_n`; contact IDs must be unique, must not be yourself,

        and every contact must be an accepted friend. On update, the share

        version increments and shares from older versions are deleted.

        Rate limit: 3 requests per minute (user-based).

        '
      operationId: mfaUpsertRecoveryCircle
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - password
              - threshold_k
              - total_shares_n
              - shares
              properties:
                password:
                  type: string
                mfa_code:
                  type: string
                  description: Required when MFA is already active
                threshold_k:
                  type: integer
                  minimum: 2
                  description: Shares required to recover
                total_shares_n:
                  type: integer
                  maximum: 7
                  description: Total shares to distribute
                shares:
                  type: array
                  items:
                    type: object
                    required:
                    - contact_id
                    - share_index
                    - encrypted_share
                    properties:
                      contact_id:
                        type: string
                        format: uuid
                        description: Accepted friend who will hold this share
                      share_index:
                        type: integer
                        description: Unique index in 1..total_shares_n
                      encrypted_share:
                        type: string
                        description: Base64 — Shamir share encrypted to the contact
      responses:
        '200':
          description: Recovery circle configured
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  share_version:
                    type: integer
        '400':
          description: Invalid body, constraint violation (threshold/count/uniqueness/index range), self-reference,
            contact not an accepted friend, or share not valid base64
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Incorrect password, or MFA code required/invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
      - MFA
      summary: Delete the recovery circle
      description: 'Deletes the user''s social recovery circle and all distributed shares

        (shares cascade with the circle). Requires password (and an MFA code if

        MFA is active).

        Rate limit: 3 requests per minute (user-based).

        '
      operationId: mfaDeleteRecoveryCircle
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaPasswordConfirmRequest'
      responses:
        '200':
          description: Recovery circle deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Incorrect password, or MFA code required/invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No recovery circle found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /mfa/recovery-circle/shares:
    get:
      tags:
      - MFA
      summary: List recovery shares held for others
      description: 'Returns the encrypted Shamir shares this user holds as a contact in

        other users'' recovery circles.

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: mfaGetMyRecoveryShares
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Held recovery shares
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecoveryCircleShare'
  /mfa/recovery-hardened:
    put:
      tags:
      - MFA
      summary: Toggle hardened recovery mode
      description: 'When enabled, account recovery requires BOTH an email code AND an SMS

        code simultaneously (dual-channel).

        Rate limit: 5 requests per minute (user-based).

        '
      operationId: mfaSetRecoveryHardened
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - password
              properties:
                enabled:
                  type: boolean
                password:
                  type: string
                mfa_code:
                  type: string
                  description: Required when MFA is already active
      responses:
        '200':
          description: Updated setting
          content:
            application/json:
              schema:
                type: object
                properties:
                  recovery_hardened:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Incorrect password, or MFA code required/invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /mfa/recovery-key:
    put:
      tags:
      - MFA
      summary: Store or update the recovery-wrapped private key
      description: 'Upserts the user''s recovery key material: the E2EE private key wrapped

        with a recovery-derived key, plus its derivation salt. Optionally also

        stores a recovery-wrapped preferences key — `recovery_wrapped_prefs_key`

        and `recovery_prefs_key_salt` must be provided together (both or

        neither). All values are base64-encoded; the server stores them opaque

        and never sees plaintext key material.

        Rate limit: 3 requests per minute (user-based).

        '
      operationId: mfaStoreRecoveryKey
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - recovery_wrapped_private_key
              - recovery_key_salt
              properties:
                recovery_wrapped_private_key:
                  type: string
                  description: Base64 — E2EE private key wrapped with the recovery-derived key
                recovery_key_salt:
                  type: string
                  description: Base64 — salt used to derive the recovery wrapping key
                recovery_wrapped_prefs_key:
                  type: string
                  description: Base64 — preferences key wrapped with the recovery-derived key (requires
                    recovery_prefs_key_salt)
                recovery_prefs_key_salt:
                  type: string
                  description: Base64 — salt for the prefs wrapping key (requires recovery_wrapped_prefs_key)
      responses:
        '200':
          description: Recovery key stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          description: Missing required fields, prefs fields not provided together, or a field is not
            valid base64
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      tags:
      - MFA
      summary: Get recovery key status
      description: 'Returns whether the user has stored a recovery key. Does NOT return the

        key material itself — only existence and creation time.

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: mfaGetRecoveryKeyStatus
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Recovery key status
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_recovery_key:
                    type: boolean
                  created_at:
                    type: string
                    format: date-time
                    description: Present only when has_recovery_key is true
    delete:
      tags:
      - MFA
      summary: Remove the recovery key
      description: 'Deletes the user''s stored recovery key material after verifying the

        password (and an MFA code if MFA is active). Idempotent — returns 200

        even when no recovery key exists.

        Rate limit: 3 requests per minute (user-based).

        '
      operationId: mfaDeleteRecoveryKey
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaPasswordConfirmRequest'
      responses:
        '200':
          description: Recovery key removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Incorrect password, or MFA code required/invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /mfa/recovery-only:
    put:
      tags:
      - MFA
      summary: Set recovery-only MFA methods
      description: 'Marks MFA methods as recovery-only (not usable for login). At least one

        enabled method must remain login-eligible. Listing email or SMS

        automatically enables hardened recovery mode.

        Rate limit: 5 requests per minute (user-based).

        '
      operationId: mfaSetRecoveryOnly
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - password
              properties:
                methods:
                  type: array
                  items:
                    type: string
                  description: Methods to mark recovery-only (e.g. ["email", "sms"]); empty array clears
                password:
                  type: string
                mfa_code:
                  type: string
                  description: Required when MFA is already active
      responses:
        '200':
          description: Updated recovery settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  recovery_only_methods:
                    type: array
                    items:
                      type: string
                  recovery_hardened:
                    type: boolean
        '400':
          description: Password missing, or no MFA method would remain login-eligible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Incorrect password, or MFA code required/invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /mfa/recovery-requests:
    get:
      tags:
      - MFA
      summary: List pending recovery requests
      description: 'Returns pending, unexpired recovery requests targeting the

        authenticated user''s account.

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: mfaListRecoveryRequests
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Pending recovery requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  requests:
                    type: array
                    items:
                      $ref: '#/components/schemas/RecoveryRequestSummary'
  /mfa/recovery-requests/social:
    get:
      tags:
      - MFA
      summary: List pending social recovery requests
      description: 'Returns pending, unexpired social recovery requests where the

        authenticated user is a circle contact.

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: mfaListSocialRecoveryRequests
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Pending social recovery requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  requests:
                    type: array
                    items:
                      $ref: '#/components/schemas/SocialRecoveryRequestSummary'
  /mfa/recovery-requests/social/{id}/respond:
    post:
      tags:
      - MFA
      summary: Submit a share for a social recovery request
      description: 'As a circle contact, submits the re-encrypted Shamir share for a pending

        social recovery request. The request completes when the share threshold

        is met.

        Rate limit: 5 requests per minute (user-based).

        '
      operationId: mfaRespondToSocialRecovery
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Social recovery request UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - encrypted_share
              properties:
                encrypted_share:
                  type: string
                  description: Base64 — share re-encrypted to the requester's ephemeral public key
      responses:
        '200':
          description: Share submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  shares_received:
                    type: integer
                  threshold_met:
                    type: boolean
        '400':
          description: Missing/invalid base64 share, request no longer pending, or request expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Recovery request not found or you are not a contact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: You have already responded to this request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /mfa/recovery-requests/{id}/respond:
    post:
      tags:
      - MFA
      summary: Approve or reject a recovery request
      description: 'Responds to a pending recovery request for the authenticated user''s own

        account. Approval requires base64 `encrypted_payload` and

        `responder_public_key`.

        Rate limit: 5 requests per minute (user-based).

        '
      operationId: mfaRespondToRecoveryRequest
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Recovery request UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - action
              properties:
                action:
                  type: string
                  enum:
                  - approve
                  - reject
                encrypted_payload:
                  type: string
                  description: Base64 — required for approve
                responder_public_key:
                  type: string
                  description: Base64 — required for approve
      responses:
        '200':
          description: Response recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          description: Invalid action, missing/invalid base64 approval payloads, or request already responded
            to
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not authorized to respond to this request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Recovery request not found or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /mfa/status:
    get:
      tags:
      - MFA
      summary: Get MFA status across all methods
      description: 'Returns TOTP, WebAuthn, email/SMS, backup-code, and recovery-mode status.

        Self-heals stale denormalized flags before responding.

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: getMfaStatus
      security:
      - BearerAuth: []
      responses:
        '200':
          description: MFA status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaStatus'
  /mfa/totp/confirm-setup:
    post:
      tags:
      - MFA
      summary: Activate TOTP MFA (enrollment step 2)
      description: 'Activates MFA after the user confirms they saved their backup codes.

        Rate limit: 5 requests per minute (user-based).

        '
      operationId: mfaTotpConfirmSetup
      security:
      - BearerAuth: []
      responses:
        '200':
          description: MFA is now active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          description: No TOTP setup in progress, or code not yet verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: TOTP MFA is already active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /mfa/totp/disable:
    post:
      tags:
      - MFA
      summary: Disable TOTP MFA
      description: 'Deletes the TOTP enrollment. Requires password and a valid MFA code.

        Idempotent — returns 200 even when no TOTP enrollment exists.

        Rate limit: 3 requests per minute (user-based).

        '
      operationId: mfaTotpDisable
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - password
              - code
              properties:
                password:
                  type: string
                code:
                  type: string
                  description: TOTP or backup code
      responses:
        '200':
          description: TOTP MFA disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Incorrect password or invalid MFA code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /mfa/totp/setup:
    post:
      tags:
      - MFA
      summary: Begin TOTP enrollment
      description: 'Generates and stores an encrypted TOTP secret. Requires password

        confirmation (and a valid MFA code if MFA is already active).

        Rate limit: 3 requests per minute (user-based).

        '
      operationId: mfaTotpSetup
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaPasswordConfirmRequest'
      responses:
        '200':
          description: TOTP secret generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  otpauth_url:
                    type: string
                    description: otpauth:// provisioning URL for authenticator apps
                  secret:
                    type: string
                    description: Base32 TOTP secret
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Incorrect password, or MFA code required/invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: TOTP is already enabled — disable it first to re-enroll
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /mfa/totp/verify-setup:
    post:
      tags:
      - MFA
      summary: Verify TOTP code (enrollment step 1)
      description: 'Validates a TOTP code against the pending secret and returns backup codes.

        Does NOT activate MFA yet — call /mfa/totp/confirm-setup afterwards.

        5 failed attempts trigger a 15-minute lockout.

        Rate limit: 5 requests per minute (user-based).

        '
      operationId: mfaTotpVerifySetup
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - code
              properties:
                code:
                  type: string
                  description: 6-digit TOTP code from the authenticator app
      responses:
        '200':
          description: Code verified; backup codes issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  backup_codes:
                    type: array
                    items:
                      type: string
                  message:
                    type: string
        '400':
          description: Code missing, or no TOTP setup in progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Invalid code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: TOTP is already verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many failed attempts — setup is locked for 15 minutes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /mfa/trusted-devices:
    get:
      tags:
      - MFA
      summary: List trusted recovery devices
      description: 'Rate limit: 10 requests per minute (user-based).'
      operationId: mfaListTrustedDevices
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Trusted devices
          content:
            application/json:
              schema:
                type: object
                properties:
                  devices:
                    type: array
                    items:
                      $ref: '#/components/schemas/TrustedDevice'
    post:
      tags:
      - MFA
      summary: Designate the current device as trusted
      description: 'Designates the calling device (identified by the X-Machine-Id header) as

        a trusted recovery device. Upserts on (user, machine) conflict.

        Rate limit: 3 requests per minute (user-based).

        '
      operationId: mfaDesignateTrustedDevice
      security:
      - BearerAuth: []
      parameters:
      - name: X-Machine-Id
        in: header
        required: true
        schema:
          type: string
          format: uuid
        description: Hardware-fingerprint machine ID of the calling device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - password
              - device_name
              properties:
                password:
                  type: string
                mfa_code:
                  type: string
                  description: Required when MFA is already active
                device_name:
                  type: string
      responses:
        '200':
          description: Device designated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  device_name:
                    type: string
                  machine_id:
                    type: string
                  designated_at:
                    type: string
                    format: date-time
        '400':
          description: Missing password/device_name, or missing X-Machine-Id header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Incorrect password, or MFA code required/invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /mfa/trusted-devices/{id}:
    delete:
      tags:
      - MFA
      summary: Remove a trusted recovery device
      description: 'Removes a trusted device after verifying password (and MFA code if active).

        Rate limit: 3 requests per minute (user-based).

        '
      operationId: mfaRemoveTrustedDevice
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Trusted device UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaPasswordConfirmRequest'
      responses:
        '200':
          description: Trusted device removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Incorrect password, or MFA code required/invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Trusted device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /mfa/webauthn/credentials:
    get:
      tags:
      - MFA
      summary: List WebAuthn credentials
      description: 'Rate limit: 10 requests per minute (user-based).'
      operationId: mfaWebauthnListCredentials
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Registered credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  credentials:
                    type: array
                    items:
                      $ref: '#/components/schemas/WebAuthnCredentialSummary'
  /mfa/webauthn/credentials/{id}:
    delete:
      tags:
      - MFA
      summary: Delete a WebAuthn credential
      description: 'Removes a registered security key. Requires password confirmation.

        Returns the remaining credential IDs so the client can update the authenticator.

        Rate limit: 3 requests per minute (user-based).

        '
      operationId: mfaWebauthnDeleteCredential
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Credential record UUID (from the credentials list)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - password
              properties:
                password:
                  type: string
      responses:
        '200':
          description: Credential deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  remaining_credential_ids:
                    type: array
                    items:
                      type: string
                    description: Base64url-encoded WebAuthn credential IDs still registered
                  user_id:
                    type: string
                    format: uuid
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Incorrect password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Credential not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /mfa/webauthn/register/begin:
    post:
      tags:
      - MFA
      summary: Begin WebAuthn credential registration
      description: 'Starts WebAuthn registration and returns credential creation options.

        Requires password (and MFA code if MFA is active). Maximum 10 credentials

        per user. The registration session expires after 5 minutes.

        Rate limit: 3 requests per minute (user-based).

        '
      operationId: mfaWebauthnRegisterBegin
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - password
              properties:
                password:
                  type: string
                mfa_code:
                  type: string
                  description: Required when MFA is already active
                credential_name:
                  type: string
                  description: 'Display name for the key (default: "Security Key")'
                credential_type:
                  type: string
                  enum:
                  - hardware
                  - platform
                  description: 'Authenticator attachment (default: hardware)'
      responses:
        '200':
          description: WebAuthn credential creation options (CredentialCreation)
          content:
            application/json:
              schema:
                type: object
                description: navigator.credentials.create() options per WebAuthn Level 2
                properties:
                  publicKey:
                    type: object
                    additionalProperties: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Incorrect password, or MFA code required/invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Maximum of 10 WebAuthn credentials reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /mfa/webauthn/register/finish:
    post:
      tags:
      - MFA
      summary: Finish WebAuthn credential registration
      description: 'Completes registration with the authenticator''s attestation response and

        stores the credential. Consumes the single-use registration session.

        Rate limit: 5 requests per minute (user-based).

        '
      operationId: mfaWebauthnRegisterFinish
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: WebAuthn PublicKeyCredential attestation response (output of navigator.credentials.create())
              additionalProperties: true
      responses:
        '200':
          description: Security key registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  credential_name:
                    type: string
                  credential_type:
                    type: string
        '400':
          description: No registration in progress, session expired, or attestation verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /mfa/webauthn/verify-inline/begin:
    post:
      tags:
      - MFA
      summary: Begin inline WebAuthn verification
      description: 'Starts a WebAuthn assertion for verifying MFA on protected operations

        (without a login challenge token). The session expires after 2 minutes.

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: mfaWebauthnVerifyInlineBegin
      security:
      - BearerAuth: []
      responses:
        '200':
          description: WebAuthn assertion options (CredentialAssertion)
          content:
            application/json:
              schema:
                type: object
                description: navigator.credentials.get() options per WebAuthn Level 2
                properties:
                  publicKey:
                    type: object
                    additionalProperties: true
        '400':
          description: No WebAuthn credentials registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /mfa/webauthn/verify-inline/finish:
    post:
      tags:
      - MFA
      summary: Finish inline WebAuthn verification
      description: 'Validates the WebAuthn assertion. On success returns a short-lived

        (60-second, single-use) verification token usable as `mfa_code` on

        protected endpoints. Consumes the single-use verification session.

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: mfaWebauthnVerifyInlineFinish
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: WebAuthn PublicKeyCredential assertion response (output of navigator.credentials.get())
              additionalProperties: true
      responses:
        '200':
          description: Verification succeeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  mfa_token:
                    type: string
                    description: Single-use verification token (60-second TTL)
        '400':
          description: No verification session found — start a new verification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Assertion verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /notifications/mute:
    put:
      tags:
      - Notifications
      summary: Set a mute preference
      description: 'Upsert a mute preference for a (target_type, target_id) pair. `muted: false` is meaningful

        (explicitly unmuted, e.g. a channel overriding a muted server), not a delete. `muted_until`

        is honored only when `muted` is true; absent means indefinite.

        Rate limit: 60 requests per minute.

        '
      operationId: setNotificationMute
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MuteRequest'
      responses:
        '200':
          description: Preference upserted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        '400':
          description: Invalid body, target_type, target_id, or muted_until
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /notifications/preferences:
    get:
      tags:
      - Notifications
      summary: List notification preferences
      description: 'Every mute preference for the caller (per-server, per-channel, per-DM). Clients call
        this

        once at app start to hydrate the local preference store; mute logic is applied client-side.

        Rate limit: 30 requests per minute.

        '
      operationId: listNotificationPreferences
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Notification preferences
          content:
            application/json:
              schema:
                type: object
                properties:
                  preferences:
                    type: array
                    items:
                      $ref: '#/components/schemas/NotificationPreference'
        '429':
          $ref: '#/components/responses/RateLimited'
  /ownership/reverse/{token}:
    post:
      tags:
      - Servers
      summary: Reverse an ownership transfer
      operationId: reverseOwnershipTransfer
      description: 'Reverse a completed server ownership transfer using the 64-character

        reversal token from the notification email. Only the original owner may

        reverse, within the reversal window; requires password and (if enabled)

        MFA confirmation.

        Rate limit: 3 requests per 15 minutes (user-based).

        '
      security:
      - BearerAuth: []
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
          minLength: 64
          maxLength: 64
        description: 64-character reversal token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - password
              properties:
                password:
                  type: string
                mfa_code:
                  type: string
                  description: Required when MFA is enabled for the account
      responses:
        '200':
          description: Transfer reversed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  owner_id:
                    type: string
                    format: uuid
                    description: Restored (original) owner
        '400':
          description: Token is not 64 characters, or request body is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is not the original owner, password is invalid, or MFA is required/invalid
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                properties:
                  error:
                    type: string
                  mfa_required:
                    type: boolean
                    description: Present when MFA verification is required
                  methods:
                    type: array
                    items:
                      type: string
                    description: Enabled MFA methods (present with mfa_required)
        '404':
          description: Invalid or expired reversal token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Ownership changed since the transfer, or original owner is no longer a member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '410':
          description: Reversal window has expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /privacy/erase-account:
    post:
      tags:
      - Privacy
      summary: Erase account
      operationId: eraseAccount
      description: 'Permanently erase the authenticated user''s account (GDPR Article 17).

        Deletes atomically with cascade through all user-linked tables and

        writes a privacy-safe audit row. Available before email verification.

        Rate limit: 3 requests per 24 hours (user-based).

        '
      security:
      - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: Optional empty object; unknown fields are ignored
      responses:
        '204':
          description: Account erased
        '400':
          description: Malformed JSON body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /servers:
    get:
      tags:
      - Servers
      summary: List user's servers
      description: 'List all servers the current user is a member of, including role and member counts.

        Rate limit: 30 requests per minute.

        '
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Server list
          content:
            application/json:
              schema:
                type: object
                properties:
                  servers:
                    type: array
                    items:
                      $ref: '#/components/schemas/ServerWithRole'
    post:
      tags:
      - Servers
      summary: Create a server
      description: 'Create a new server. The creator becomes the owner.

        Rate limit: 10 requests per minute.

        '
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServerRequest'
      responses:
        '201':
          description: Server created
          content:
            application/json:
              schema:
                type: object
                properties:
                  server:
                    $ref: '#/components/schemas/Server'
                  role:
                    type: string
                    example: owner
        '400':
          $ref: '#/components/responses/BadRequest'
  /servers/unread-status:
    get:
      tags:
      - Servers
      summary: Get unread status across all servers
      description: 'Returns a list of server IDs that have unread messages.

        Rate limit: 30 requests per minute.

        '
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Server IDs with unread messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  server_ids:
                    type: array
                    items:
                      type: string
                      format: uuid
  /servers/{id}:
    get:
      tags:
      - Servers
      summary: Get a server
      description: 'Get server details including the current user''s role.

        Rate limit: 30 requests per minute.

        '
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ServerId'
      responses:
        '200':
          description: Server details
          content:
            application/json:
              schema:
                type: object
                properties:
                  server:
                    $ref: '#/components/schemas/Server'
                  role:
                    type: string
                    enum:
                    - owner
                    - admin
                    - member
        '403':
          description: Not a member of this server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Server not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags:
      - Servers
      summary: Update a server
      description: 'Update server name and icon. Requires owner or admin role.

        Rate limit: 10 requests per minute.

        '
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ServerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateServerRequest'
      responses:
        '200':
          description: Server updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  server:
                    $ref: '#/components/schemas/Server'
                  role:
                    type: string
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
      - Servers
      summary: Delete a server
      description: 'Permanently delete a server. Owner only.

        Rate limit: 5 requests per minute.

        '
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ServerId'
      responses:
        '200':
          description: Server deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '403':
          description: Only the server owner can delete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /servers/{id}/entitlements:
    get:
      tags:
      - Servers
      summary: Get a server's entitlement set
      description: 'Get the server-axis entitlement set (Groundspeed free / Mach
        boosted) for a server. Members only. Every server resolves to Groundspeed
        today; the Mach tier ships with server subscriptions (v1.0).

        Rate limit: 30 requests per minute.

        '
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ServerId'
      responses:
        '200':
          description: Server entitlement set
          content:
            application/json:
              schema:
                type: object
                properties:
                  entitlement:
                    type: object
                    properties:
                      Tier:
                        type: string
                        enum:
                        - groundspeed
                        - mach
                      MaxServerCustomEmoji:
                        type: integer
                      MaxServerStickers:
                        type: integer
                      MaxServerStoragePoolBytes:
                        type: integer
                        format: int64
                        description: -1 sentinel = limit not yet decided (do not enforce)
                      UnlockServerAudioQualityCaps:
                        type: boolean
                      UnlockServerVideoQualityCaps:
                        type: boolean
        '400':
          description: Invalid server ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a member of this server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /servers/{id}/audit-log:
    get:
      tags:
      - Servers
      summary: Get server audit log
      description: 'Get paginated audit log entries for a server, newest first.

        Requires the View Audit Log permission.

        Rate limit: 30 requests per minute.

        '
      operationId: getServerAuditLog
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ServerId'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
        description: Max entries to return (values outside 1-100 fall back to 50)
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
        description: Pagination offset
      responses:
        '200':
          description: Audit log page
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
