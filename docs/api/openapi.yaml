                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Insufficient permissions, managed/default role, or hierarchy violation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /servers/{id}/transfer-ownership:
    post:
      tags:
      - Servers
      summary: Initiate a server ownership transfer
      description: 'Start a pending ownership transfer to another member of the server. Owner only;

        requires password re-verification and (if enabled) MFA confirmation. The target

        must already be a member, and only one transfer may be pending per server. The

        transfer remains pending for 24 hours before automatic completion; the current

        owner receives a notification email containing a reversal token, and an

        `ownership_transfer_initiated` WebSocket event is broadcast to the server.

        Rate limit: 3 requests per minute (user-based).

        '
      operationId: initiateOwnershipTransfer
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ServerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - target_user_id
              - password
              properties:
                target_user_id:
                  type: string
                  format: uuid
                  description: Member to transfer ownership to (cannot be yourself)
                password:
                  type: string
                  description: Current owner's password, re-verified before initiating
                mfa_code:
                  type: string
                  description: Required when MFA is enabled for the account
      responses:
        '201':
          description: Transfer initiated (pending)
          content:
            application/json:
              schema:
                type: object
                properties:
                  transfer_id:
                    type: string
                    format: uuid
                  server_id:
                    type: string
                    format: uuid
                  from_user_id:
                    type: string
                    format: uuid
                  to_user_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: pending
                  expires_at:
                    type: string
                    format: date-time
                    description: When the pending transfer auto-completes
        '400':
          description: Invalid server ID or request body, target is yourself, or target is not a member
            of this server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is not the server owner, password is invalid, or MFA is required/invalid
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                properties:
                  error:
                    type: string
                  mfa_required:
                    type: boolean
                    description: Present when MFA verification is required
                  methods:
                    type: array
                    items:
                      type: string
                    description: Enabled MFA methods (present with mfa_required)
        '404':
          description: Server not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: A transfer is already pending for this server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      tags:
      - Servers
      summary: Get ownership transfer status
      description: 'Get the pending ownership transfer for a server, if any. Any member may query;

        the `from_user_id` / `to_user_id` fields are included only when the caller is

        the current owner or the transfer target.

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: getOwnershipTransferStatus
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ServerId'
      responses:
        '200':
          description: Transfer status (transfer is null when none is pending)
          content:
            application/json:
              schema:
                type: object
                properties:
                  transfer:
                    type: object
                    nullable: true
                    properties:
                      transfer_id:
                        type: string
                        format: uuid
                      status:
                        type: string
                        example: pending
                      requested_at:
                        type: string
                        format: date-time
                      expires_at:
                        type: string
                        format: date-time
                      from_user_id:
                        type: string
                        format: uuid
                        description: Only included for the current owner and the transfer target
                      to_user_id:
                        type: string
                        format: uuid
                        description: Only included for the current owner and the transfer target
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Not a member of this server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
      - Servers
      summary: Cancel a pending ownership transfer
      description: 'Cancel the pending ownership transfer for a server. Owner only. Broadcasts an

        `ownership_transfer_cancelled` WebSocket event to the server.

        Rate limit: 3 requests per minute (user-based).

        '
      operationId: cancelOwnershipTransfer
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ServerId'
      responses:
        '200':
          description: Transfer cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Only the server owner can cancel the transfer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Server not found, or no pending transfer to cancel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /servers/{id}/transfer-ownership/confirm:
    post:
      tags:
      - Servers
      summary: Confirm a pending ownership transfer
      description: 'Complete a pending ownership transfer early. Owner only.

        Rate limit: 3 requests per minute.

        '
      operationId: confirmOwnershipTransfer
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/ServerId'
      responses:
        '200':
          description: Ownership transferred
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Ownership transferred
                  new_owner_id:
                    type: string
                    format: uuid
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Only the server owner can confirm the transfer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Server not found or no pending transfer to confirm
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Transfer already completed/cancelled or a party is no longer a member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /servers/{id}/unread:
