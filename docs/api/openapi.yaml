      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Conversation UUID
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Target user UUID
      responses:
        '200':
          description: Participant server-deafened
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '400':
          description: Invalid conversation/user ID, or conversation is not a group DM
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a participant, or not a group admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Target is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
      - DM
      - Voice
      summary: Remove a server deafen from a group DM participant
      description: 'Remove a persistent server-deafen from a group DM participant (clears both

        `server_deafened` and `server_muted`). Group DMs only; admin role required. If the target

        is currently in the DM voice call, an undeafen enforcement command is published to the

        media plane and a `dm_voice_state_update` WebSocket event (`action: server_undeafened`)

        is broadcast.

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: dmVoiceHardUndeafen
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Conversation UUID
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Target user UUID
      responses:
        '200':
          description: Participant server-undeafened
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '400':
          description: Invalid conversation/user ID, or conversation is not a group DM
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a participant, or not a group admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Target is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /dm/conversations/{id}/voice/{userId}/mute:
    post:
      tags:
      - DM
      - Voice
      summary: Server-mute a group DM participant
      description: 'Apply a persistent server-mute to a group DM participant (sets `server_muted` on the

        participant row; the target cannot undo it). Group DMs only; the caller must hold the

        `admin` role in the conversation. If the target is currently in the DM voice call, an

        enforcement command is published to the media plane and a `dm_voice_state_update`

        WebSocket event (`action: server_muted`) is broadcast to participants.

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: dmVoiceHardMute
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Conversation UUID
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Target user UUID
