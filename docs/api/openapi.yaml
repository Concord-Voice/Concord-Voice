  /dm/conversations/{id}/rotate-key:
    post:
      tags:
      - DM
      - E2EE
      summary: Rotate DM encryption key
      description: 'Initiate key rotation for a DM conversation (all DMs are encrypted under the E2EE-everywhere
        posture, #201).

        Rate limit: 10 requests per 24 hours (per conversation, Redis INCR+EXPIRE).

        '
      operationId: rotateDMKey
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Key rotation initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Key rotation initiated
                  new_key_version:
                    type: integer
        '400':
          description: Invalid conversation ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
  /dm/conversations/{id}/voice/authorize:
    post:
      tags:
      - DM
      - Voice
      summary: Authorize DM voice at the SFU boundary
      description: 'Defense-in-depth auth re-check called by the media-plane (with the user''s JWT)

        when an SFU client connects with roomId == conversation_id. Pure membership

        check against dm_participants; no state mutation.

        Rate limit: 60 requests per minute (user-based).

        '
      operationId: authorizeDMVoiceForMediaPlane
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Conversation UUID
      responses:
        '200':
          description: User is authorized for this DM voice room
          content:
            application/json:
              schema:
                type: object
                properties:
                  authorized:
                    type: boolean
                    example: true
                  is_group:
                    type: boolean
        '400':
          description: Invalid conversation ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a participant
          content:
            application/json:
              schema:
                type: object
                properties:
                  authorized:
                    type: boolean
                    example: false
                  error:
                    type: string
  /dm/conversations/{id}/voice/cancel:
    post:
      tags:
      - DM
      - Voice
      summary: Cancel a DM voice call ring
      description: 'Cancel a pending ring before any callee accepts. Only the ring initiator may

        cancel; broadcasts dm_voice_call_canceled to the conversation.

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: cancelDMVoiceCall
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Conversation UUID
      responses:
        '204':
          description: Ring canceled
        '400':
          description: Invalid conversation ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Only the ring initiator can cancel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No active ring for this conversation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /dm/conversations/{id}/voice/decline:
    post:
      tags:
      - DM
      - Voice
      summary: Decline a ringing DM voice call
      description: 'Decline a pending ring as a currently-ringing callee. Per-decliner: the ring

        continues for other callees; when all callees have declined the call ends.

        Rate limit: 30 requests per minute (user-based).

        '
      operationId: declineDMVoiceCall
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Conversation UUID
      responses:
        '204':
          description: Decline recorded
        '400':
          description: Invalid conversation ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a ringing callee for this call
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No active ring for this conversation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /dm/conversations/{id}/voice/join:
    post:
      tags:
      - DM
      - Voice
      summary: Join DM voice call
      description: 'Authorize joining a voice call in a DM conversation. Returns the media server URL,
        ICE servers, and the caller''s server-enforcement flags. If a ring is pending and the caller is
        a callee, the ring is consummated (dm_voice_call_canceled with canceled_by=someone_accepted is
        broadcast).

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: joinDMVoiceCall
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Voice call join authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DMVoiceJoinResponse'
        '400':
          description: Invalid conversation ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /dm/conversations/{id}/voice/participants:
    get:
      tags:
      - DM
      - Voice
      summary: List DM voice call participants
      description: 'Get participants currently in a DM voice call.

        Rate limit: 30 requests per minute (user-based).

