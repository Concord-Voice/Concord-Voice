        username:
          type: string
          minLength: 3
          maxLength: 50
        password:
          type: string
          minLength: 12
          maxLength: 128
        wrapped_private_key:
          type: string
          format: byte
        key_derivation_salt:
          type: string
          format: byte
        public_key:
          type: string
          format: byte
    SSOCompleteLinkRequest:
      type: object
      required:
      - sso_token
      - password
      properties:
        sso_token:
          type: string
