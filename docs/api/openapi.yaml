        schema:
          type: string
          format: uuid
        description: Media file UUID
      responses:
        '200':
          description: Encrypted attachment stream
          headers:
            X-File-Mime-Type:
              description: Original MIME type hint for client-side decryption
              schema:
                type: string
            Cache-Control:
              description: private, no-store
              schema:
                type: string
          content:
