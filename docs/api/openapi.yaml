      description: 'Proxies the encrypted blob through the control plane (object storage is not client-reachable).

        Requires membership in the owning channel or DM conversation. The body is opaque ciphertext;

        the original MIME type hint is returned in the X-File-Mime-Type header.

        Rate limit: 60 requests per minute.

