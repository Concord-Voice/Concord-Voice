          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /dm/conversations/{id}/voice/ring:
    post:
      tags:
      - DM
      - Voice
      summary: Ring a DM voice call
      description: 'Initiate server-authoritative ring signaling for a DM voice call (#1209).

        Broadcasts dm_voice_call_invited to all other participants; only one ring

        may be pending per conversation at a time.

        Rate limit: 10 requests per minute (user-based).

        '
      operationId: ringDMVoiceCall
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Conversation UUID
      responses:
        '200':
          description: Ring initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ring_id:
                    type: string
                    format: uuid
                  ring_started_at:
                    type: string
                    format: date-time
                  ringing_user_ids:
                    type: array
                    items:
                      type: string
                      format: uuid
        '400':
          description: Invalid conversation ID, or no callees in this conversation (personal DM)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: A ring is already pending for this conversation
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  existing_ring:
                    type: object
                    properties:
                      caller_user_id:
                        type: string
                        format: uuid
                      ring_id:
                        type: string
                        format: uuid
                      ring_started_at:
                        type: string
                        format: date-time
                required:
                - error
  /dm/conversations/{id}/voice/{userId}/deafen:
