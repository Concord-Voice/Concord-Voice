  /ws:
    get:
      tags:
      - WebSocket
      summary: WebSocket connection
      description: 'Upgrade to a WebSocket connection for real-time messaging.


        ## Authentication

        Use one of:

        - `?ticket=<ticket>` — Preferred. Get a ticket from `POST /auth/ws-ticket`.

        - `?token=<jwt>` — JWT access token as query parameter.

        - `Authorization: Bearer <jwt>` — JWT in header (before upgrade).


        ## Connection Lifecycle

        - Server sends `connected` message with `client_id` and `user_id`

        - Server sends `presence_snapshot` with all online users

        - Client subscribes to channels/servers

        - Ping/pong: 54s ping interval, 60s pong timeout

        - Max message size: 512KB


        ## Rate Limiting

        Token bucket: 10 message burst, 5 messages/second sustained.


        ## Client → Server Messages


        | Type | Fields | Description |

        |------|--------|-------------|

        | `subscribe` | `channel_id` | Subscribe to channel messages (verifies membership) |

        | `unsubscribe` | `channel_id` | Unsubscribe from channel |

        | `subscribe_server` | `server_id` | Subscribe to server-level events |

        | `unsubscribe_server` | `server_id` | Unsubscribe from server |

        | `message` | `channel_id`, `content`, `key_version`, `nonce` | Send message (persisted to DB)
        |

        | `typing` | `channel_id`, `is_typing` | Typing indicator |

        | `heartbeat` | — | Refresh presence TTL |

        | `set_status` | `status` (online/dnd/invisible) | Set user status |


        ## Server → Client Messages


        | Type | Fields | Description |

        |------|--------|-------------|

        | `connected` | `client_id`, `user_id` | Connection established |

        | `presence_snapshot` | `users[]` | All online users with statuses |

        | `subscribed` | `channel_id` | Channel subscription confirmed |

        | `message` | `id`, `channel_id`, `user_id`, `username`, `display_name`, `avatar_url`, `content`,
        `key_version`, `created_at` | New message |

        | `message_ack` | `nonce`, `id`, `channel_id`, `created_at` | Message persisted (sent to author)
        |

        | `message_update` | `id`, `channel_id`, `content`, `edited_at` | Message edited |

        | `message_delete` | `id`, `channel_id` | Message deleted |

        | `typing` | `channel_id`, `user_id`, `username`, `is_typing` | Typing indicator |

        | `presence` | `user_id`, `status`, `timestamp` | User status change |

        | `server_online_counts` | `counts` (server_id → count) | Updated online counts |

        | `unread_notify` | `channel_id`, `server_id` | Unread notification |

        | `profile_updated` | `user_id`, `username`, `display_name`, `avatar_url` | Profile changed |

        | `preferences_updated` | `version` | Preferences sync trigger |

        | `server_updated` | `server_id`, `name`, `icon_url` | Server modified |

        | `server_deleted` | `server_id` | Server deleted |

        | `channel_created` | channel fields | New channel |

        | `channel_updated` | `channel_id`, `server_id`, `name`, `type`, `emoji`, `audio_quality_tier`,
        `group_id` | Channel modified |

        | `channel_deleted` | `channel_id`, `server_id` | Channel deleted |

        | `member_joined` | `server_id`, `user_id`, `username`, `display_name`, `avatar_url`, `role` |
        New member |

        | `member_removed` | `server_id`, `user_id` | Member left/kicked |

        | `key_delivered` | `channel_id`, `user_id` | E2EE key now available |

        | `key_needed` | `server_id`, `user_id`, `channel_ids[]` | Key distribution needed |

        | `friend_request_received` | `id`, `from_user_id`, `from_username`, `from_display_name`, `from_avatar_url`,
        `to_user_id`, `to_username`, `to_display_name`, `to_avatar_url`, `created_at` | Incoming friend
        request, sent to the addressee. `to_*` added in #981 so the client renders in real time without
        a REST refetch. |

        | `friend_request_accepted` | `id`, `user_id`, `username`, `display_name`, `avatar_url` | A sent
        request was accepted, sent to the original requester. |

        | `friend_code_claimed` | `friendship_id`, `code_id`, `status`, `user_id`, `username`, `display_name`,
        `avatar_url`, `created_at` | A friend code was redeemed, sent to the code owner. |

        | `error` | `message` | Error |

        '
      responses:
        '101':
          description: Switching Protocols (WebSocket upgrade)
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token (15-minute expiry)
    CookieAuth:
      type: apiKey
      in: cookie
      name: refresh_token
      description: HttpOnly refresh token cookie (30-day expiry)
    AdminTokenAuth:
      type: apiKey
      in: header
      name: X-Admin-Token
      description: 'Shared-secret issuer-authorization gate for the redemption code-generation
        endpoint (#1303). Constant-time compared against the server''s REDEMPTION_ADMIN_TOKEN.
        INTERIM primitive — there is no platform-admin RBAC role in the codebase yet
        (Role is per-server only); this is the closest existing privileged-auth gate.
        When REDEMPTION_ADMIN_TOKEN is unset the endpoint is disabled (503).'
  parameters:
    ServerId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Server UUID
    ChannelId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Channel UUID
    KlipyPage:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
      description: Page number; non-numeric or < 1 values are dropped before forwarding
    KlipyPerPage:
      name: per_page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 50
      description: Results per page; clamped server-side to 50
    KlipyCustomerIdQuery:
      name: customer_id
      in: query
      required: false
      schema:
        type: string
      description: Opaque per-user KLIPY personalization ID (from POST /klipy/customer-id)
    KlipyLocale:
      name: locale
      in: query
      required: false
      schema:
        type: string
      description: Locale hint forwarded verbatim to KLIPY
    KlipyFormatFilter:
      name: format_filter
      in: query
      required: false
      schema:
        type: string
      description: KLIPY media format filter, forwarded verbatim
    KlipyCustomerIdPath:
      name: customerID
      in: path
      required: true
      schema:
        type: string
        pattern: ^[a-zA-Z0-9-]{1,100}$
      description: Opaque KLIPY customer ID (1-100 characters of [a-zA-Z0-9-])
    KlipySlugPath:
      name: slug
      in: path
      required: true
      schema:
        type: string
        pattern: ^[a-zA-Z0-9-]{1,100}$
      description: KLIPY GIF slug (1-100 characters of [a-zA-Z0-9-])
  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: Too many requests — rate limit exceeded
      headers:
        Retry-After:
          description: Seconds until the rate limit window resets
          schema:
            type: integer
            example: 3600
        X-RateLimit-Limit:
          description: Maximum requests allowed in the window
          schema:
            type: integer
            example: 10
        X-RateLimit-Remaining:
          description: Requests remaining (always 0 when 429 is returned)
          schema:
            type: integer
            example: 0
        X-RateLimit-Reset:
          description: Unix timestamp when the rate limit window resets
          schema:
            type: integer
            example: 1744329600
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimitError'
    KlipyUpstreamDown:
      description: GIF service temporarily unavailable (upstream network failure or 5xx)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    KlipyUpstreamClientError:
      description: Upstream KLIPY 4xx status mirrored with a generic error body (upstream error envelope
        is never forwarded)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Entitlement:
      type: object
      description: 'Capability set for one subscription tier — the single source of
        the free/premium feature limits, defined server-side and shipped to the client
        as data so client UX gating and server enforcement reference identical values.'
      properties:
        tier:
          type: string
          description: Subscription tier ('free' or 'premium')
          example: free
        allowCustomScheme:
          type: boolean
          description: Whether the user may select a custom color scheme
        allowedAudioTiers:
          type: array
          items:
            type: string
          description: Permitted Opus audio quality tiers
        minPtimeMs:
          type: integer
          description: Minimum Opus frame ptime in milliseconds
        allowMusicMode:
          type: boolean
        maxAudioLastN:
          type: integer
          description: Per-room audio last-N active-speaker forwarding cap (room-owner-scoped)
        maxVideoHeight:
          type: integer
        maxVideoFps:
          type: integer
        maxVideoPixelRate:
          type: integer
          format: int64
          description: width*height*fps ceiling
        maxManualBitrateBps:
          type: integer
        maxWebcamPublishers:
          type: integer
          description: Per-room camera publisher cap (room-owner-scoped)
        maxScreensharePublishers:
          type: integer
          description: Per-room screen-share publisher cap (room-owner-scoped)
        maxMessageChars:
          type: integer
        maxAttachmentBytes:
          type: integer
          format: int64
        maxAvatarBytes:
          type: integer
          format: int64
        maxBannerBytes:
          type: integer
          format: int64
        allowAnimatedProfile:
          type: boolean
        usernameChangeIntervalSeconds:
          type: integer
          format: int64
          description: Minimum interval between username changes, in seconds
      required:
      - tier
      - allowCustomScheme
      - allowedAudioTiers
      - minPtimeMs
      - allowMusicMode
      - maxAudioLastN
      - maxVideoHeight
      - maxVideoFps
      - maxVideoPixelRate
      - maxManualBitrateBps
      - maxWebcamPublishers
      - maxScreensharePublishers
      - maxMessageChars
      - maxAttachmentBytes
      - maxAvatarBytes
      - maxBannerBytes
      - allowAnimatedProfile
      - usernameChangeIntervalSeconds
    Error:
      type: object
      properties:
        error:
          type: string
      required:
      - error
    RateLimitError:
      type: object
      properties:
        error:
          type: string
          example: Rate limit exceeded
        message:
          type: string
          example: Key rotation limit reached. Try again in 23 hours 59 minutes.
        retry_after:
          type: integer
          description: Seconds until the rate limit window resets
          example: 86340
      required:
      - error
      - message
    SuccessMessage:
      type: object
      properties:
        message:
          type: string
      required:
      - message
    RegisterRequest:
      type: object
      required:
      - email
      - username
      - password
      - age_confirmation
      - public_key
      - wrapped_private_key
      - key_derivation_salt
      properties:
        email:
          type: string
          format: email
        username:
          type: string
          minLength: 3
          maxLength: 50
        password:
          type: string
          minLength: 12
          description: Must include uppercase, lowercase, digit, and special character
        age_confirmation:
          type: boolean
          description: Must be true (user confirms they are 16+)
        public_key:
          type: string
          description: Base64-encoded SPKI RSA-4096 public key
        wrapped_private_key:
          type: string
          description: Base64-encoded AES-GCM encrypted private key
        key_derivation_salt:
          type: string
          description: Base64-encoded 16-byte PBKDF2 salt
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        remember_me:
          type: boolean
          description: 'Default: true. When false, session uses browser-session cookie.'
    UpdateProfileRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        display_name:
          type: string
          maxLength: 100
          nullable: true
          description: Set to null to clear
        bio:
          type: string
          maxLength: 500
          nullable: true
        avatar_url:
          type: string
          nullable: true
          description: Data URL (max 500KB) or null to remove
        links:
          type: array
          items:
            type: string
          maxItems: 5
          description: HTTP(S) URLs, max 500 chars each
    ChangePasswordRequest:
      type: object
      required:
      - current_password
      - new_password
      - wrapped_private_key
      - key_derivation_salt
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 12
        wrapped_private_key:
          type: string
          description: Re-wrapped with new PBKDF2-derived key
        key_derivation_salt:
          type: string
          description: New salt for PBKDF2 derivation
    ReplaceKeysRequest:
      type: object
      required:
      - wrapped_private_key
      - key_derivation_salt
      properties:
        wrapped_private_key:
          type: string
        key_derivation_salt:
          type: string
    UpdatePreferencesRequest:
      type: object
      required:
      - encrypted_data
      properties:
        encrypted_data:
          type: string
          maxLength: 65536
          description: Base64-encoded AES-256-GCM encrypted preferences blob
    CreateServerRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
        icon_url:
          type: string
          nullable: true
          description: Data URL (max 500KB)
    UpdateServerRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
        icon_url:
          type: string
          nullable: true
          description: Data URL or null to remove
    CreateChannelRequest:
      type: object
      required:
      - server_id
      - name
      - type
      properties:
        server_id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 3
          maxLength: 100
        type:
          type: string
          enum:
          - text
          - voice
          - bulletin
        emoji:
          type: string
          nullable: true
        wrapped_keys:
          type: object
          additionalProperties:
            type: string
          description: 'Map of user_id → base64 wrapped CSK (required for all channels — every channel
            is E2EE under the E2EE-everywhere posture, #201)'
    UpdateChannelRequest:
      type: object
      required:
      - name
      - type
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
        type:
          type: string
          enum:
          - text
          - voice
          - bulletin
        emoji:
          type: string
          nullable: true
        audio_quality_tier:
          allOf:
          - $ref: '#/components/schemas/AudioQualityTier'
          nullable: true
          description: 'Voice-channel audio standard. Null means Personal (each member uses their own tier). Groundspeed servers allow up to standard; Mach servers allow up to studio.'
    DistributeKeysRequest:
      type: object
      required:
      - wrapped_keys
      properties:
        wrapped_keys:
          type: object
          additionalProperties:
            type: string
          description: Map of user_id → base64 wrapped CSK
    SendMessageRequest:
      type: object
      required:
      - channel_id
      - content
      properties:
        channel_id:
          type: string
          format: uuid
        content:
          type: string
          minLength: 1
          maxLength: 24000
          description: 'Base64-encoded AES-256-GCM ciphertext (all channels are E2EE under the E2EE-everywhere
            posture, #201)'
    UpdateMessageRequest:
      type: object
      required:
      - content
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 24000
    AddMemberRequest:
      type: object
      required:
      - user_id
      properties:
        user_id:
          type: string
          format: uuid
    UpdateMemberRequest:
      type: object
      required:
      - role
      properties:
        role:
          type: string
          enum:
          - admin
          - member
    TimeoutMemberRequest:
      type: object
      required:
      - duration_seconds
      properties:
        duration_seconds:
          type: integer
          format: int64
          minimum: 60
          maximum: 604800
          description: Timeout duration in seconds, from 1 minute to 7 days
        reason:
          type: string
          nullable: true
          description: Optional audit-log reason for the timeout
    MemberTimeoutResponse:
      type: object
      properties:
        message:
          type: string
        server_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        timed_out_until:
          type: string
          format: date-time
          nullable: true
          description: UTC timestamp when the timeout expires, or null when cleared
      required:
      - message
      - server_id
      - user_id
      - timed_out_until
    CreateInviteRequest:
      type: object
      properties:
        max_uses:
          type: integer
          minimum: 0
          maximum: 100
          default: 1
          description: 0 = unlimited
        expires_in:
          type: integer
          minimum: 300
          maximum: 604800
          default: 86400
          description: Seconds until expiry (5min to 7d, default 24h)
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        username:
          type: string
        display_name:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        links:
          type: array
          items:
            type: string
        email_verified:
          type: boolean
        age_verified:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    E2EEKeys:
      type: object
