    RecoveryResetPasswordRequest:
      type: object
      required:
      - recovery_token
      - new_password
      - wrapped_private_key
      - key_derivation_salt
      - key_derivation_alg
      properties:
        recovery_token:
          type: string
          description: Single-use token from /auth/recovery/verify-code
        new_password:
          type: string
          minLength: 12
        wrapped_private_key:
          type: string
          format: byte
        key_derivation_salt:
          type: string
          format: byte
        key_derivation_alg:
          type: string
          example: argon2id
        recovery_wrapped_private_key:
          type: string
          format: byte
          description: Optional recovery-key upsert (with recovery_key_salt)
        recovery_key_salt:
          type: string
          format: byte
        recovery_wrapped_prefs_key:
          type: string
          format: byte
        recovery_prefs_key_salt:
          type: string
          format: byte
    RecoveryResetAccountRequest:
      type: object
      required:
      - recovery_token
      - new_password
      - wrapped_private_key
      - key_derivation_salt
      - key_derivation_alg
      - public_key
      properties:
        recovery_token:
          type: string
          description: Single-use token from /auth/recovery/verify-code
        new_password:
          type: string
          minLength: 12
        wrapped_private_key:
          type: string
          format: byte
        key_derivation_salt:
          type: string
          format: byte
        key_derivation_alg:
          type: string
          example: argon2id
        public_key:
          type: string
          format: byte
        acknowledge_data_loss:
          type: boolean
          description: Must be true — all encrypted message history is permanently lost
    RecoveryRequestCreate:
      type: object
